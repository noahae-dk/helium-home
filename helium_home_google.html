<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Helium Start Page — Google</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      overflow: hidden;
    }

    body {
      background-image: url('tlou wallpaper 2 helium.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      position: relative;
      color: white;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.18), rgba(0, 0, 0, 0.06));
      pointer-events: none;
    }

    .overlay {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      padding: 24px;
    }

    .clock {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-shadow: 0 4px 18px rgba(0, 0, 0, 0.45);
      user-select: none;
    }

    .search-wrap {
      width: min(540px, calc(100vw - 48px));
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .search-form {
      display: flex;
      align-items: center;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      background: rgba(10, 16, 24, 0.38);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
      overflow: hidden;
      transition: transform 0.22s ease, box-shadow 0.22s ease, background 0.22s ease, border-color 0.22s ease;
    }

    .search-input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      color: white;
      font-size: 1rem;
      padding: 14px 16px;
    }

    .search-input::placeholder {
      color: rgba(255, 255, 255, 0.72);
      transition: opacity 0.2s ease;
    }

    .search-form:hover {
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 16px 38px rgba(0, 0, 0, 0.28);
      border-color: rgba(255, 255, 255, 0.22);
      background: rgba(12, 18, 28, 0.46);
    }

    .search-form:focus-within {
      transform: translateY(-3px) scale(1.015);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.32);
      border-color: rgba(255, 255, 255, 0.3);
      background: rgba(14, 20, 32, 0.52);
    }

    .search-form:focus-within .search-input::placeholder {
      opacity: 0.55;
    }

    .search-button {
      border: none;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      padding: 14px 18px;
      cursor: pointer;
      font-size: 0.95rem;
      transition: background 0.18s ease, transform 0.16s ease;
    }

    .search-button:hover {
      background: rgba(255, 255, 255, 0.16);
    }

    .search-button:active {
      background: rgba(255, 255, 255, 0.2);
      transform: scale(0.97);
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="clock" id="clock">00:00:00</div>

    <div class="search-wrap">
      <form class="search-form" id="searchForm">
        <input
          class="search-input"
          id="searchInput"
          type="text"
          placeholder="Search Google..."
          autocomplete="off"
        />
        <button class="search-button" type="submit">Search</button>
      </form>
    </div>
  </div>

  <script>
    const clock = document.getElementById('clock');

    function updateClock() {
      const now = new Date();
      const time = now.toLocaleTimeString('en-GB', {
        hour12: false,
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });
      clock.textContent = time;
    }

    updateClock();
    setInterval(updateClock, 1000);

    const form = document.getElementById('searchForm');
    const input = document.getElementById('searchInput');

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      const query = input.value.trim();
      if (!query) return;

      const url = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
      window.location.href = url;
    });
  </script>
</body>
</html>
