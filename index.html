<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#05070a" />
  <title>Helium Start Page</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      overflow: hidden;
      background: #05070a;
      color-scheme: dark;
    }

    body {
      background-color: #05070a;
      background-image: url('tlou wallpaper 2 helium.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      position: relative;
      color: white;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.18), rgba(0, 0, 0, 0.06));
      pointer-events: none;
    }

    .overlay {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      padding: 24px;
    }

    .clock {
      font-size: 2.35rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-shadow: 0 4px 18px rgba(0, 0, 0, 0.45);
      user-select: none;
      line-height: 1;
      margin-bottom: 8px;
    }

    .date {
      font-size: 1.08rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-shadow: 0 4px 18px rgba(0, 0, 0, 0.45);
      user-select: none;
      color: rgba(255, 255, 255, 0.92);
    }

    .search-wrap {
      width: min(720px, calc(100vw - 48px));
      position: absolute;
      top: 42%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .search-wrap.has-result .suggestions {
      top: calc(100% + 96px);
    }

    .search-form {
      display: flex;
      align-items: center;
      position: relative;
      z-index: 30;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      background: rgba(10, 16, 24, 0.40);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 18px;
      box-shadow: 0 12px 34px rgba(0, 0, 0, 0.24);
      overflow: visible;
      transition:
        transform 0.34s cubic-bezier(.2, .8, .2, 1),
        box-shadow 0.34s cubic-bezier(.2, .8, .2, 1),
        background 0.34s cubic-bezier(.2, .8, .2, 1),
        border-color 0.34s cubic-bezier(.2, .8, .2, 1),
        filter 0.34s cubic-bezier(.2, .8, .2, 1);
    }

    .search-form::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background:
        radial-gradient(circle at 12% 50%, rgba(255, 255, 255, 0.06), transparent 28%),
        linear-gradient(90deg, rgba(255,255,255,0.04), transparent 22%, transparent 78%, rgba(255,255,255,0.03));
      opacity: 0.8;
      pointer-events: none;
      transition: opacity 0.34s ease, transform 0.34s ease;
    }

    .search-form:hover {
      transform: translateY(-3px) scale(1.012);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.30);
      border-color: rgba(255, 255, 255, 0.22);
      background: rgba(12, 18, 28, 0.48);
      filter: saturate(1.05);
    }

    .search-form:hover::before {
      opacity: 1;
      transform: translateX(4px);
    }

    .search-form:focus-within {
      transform: translateY(-4px) scale(1.016);
      box-shadow: 0 20px 48px rgba(0, 0, 0, 0.34);
      border-color: rgba(255, 255, 255, 0.28);
      background: rgba(14, 20, 32, 0.54);
    }

    .search-form.mode-chatgpt {
      background: rgba(9, 22, 18, 0.56);
      border-color: rgba(104, 255, 191, 0.22);
      box-shadow:
        0 20px 48px rgba(0, 0, 0, 0.34),
        0 0 0 1px rgba(104, 255, 191, 0.07) inset,
        0 0 44px rgba(104, 255, 191, 0.06);
    }

    .search-form.mode-chatgpt::before {
      background:
        radial-gradient(circle at 12% 50%, rgba(104, 255, 191, 0.12), transparent 30%),
        linear-gradient(90deg, rgba(104,255,191,0.06), transparent 30%, transparent 74%, rgba(104,255,191,0.04));
    }

    .search-form.mode-chatgpt:hover,
    .search-form.mode-chatgpt:focus-within {
      background: rgba(10, 24, 19, 0.62);
      border-color: rgba(104, 255, 191, 0.30);
      box-shadow:
        0 22px 52px rgba(0, 0, 0, 0.36),
        0 0 0 1px rgba(104, 255, 191, 0.10) inset,
        0 0 58px rgba(104, 255, 191, 0.10);
    }

    .engine-picker {
      position: relative;
      flex-shrink: 0;
      padding-right: 10px;
      transition: opacity 0.24s ease, transform 0.30s cubic-bezier(.2, .8, .2, 1);
    }

    .search-form.mode-chatgpt .engine-picker {
      opacity: 0;
      transform: translateX(14px) scale(0.96);
      pointer-events: none;
    }

    .engine-trigger {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      height: 42px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      outline: none;
      background: rgba(255, 255, 255, 0.08);
      color: white;
      padding: 0 14px 0 12px;
      cursor: pointer;
      border-radius: 999px;
      transition:
        background 0.22s ease,
        border-color 0.22s ease,
        transform 0.22s ease,
        box-shadow 0.22s ease,
        opacity 0.22s ease;
      min-width: 132px;
      justify-content: center;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .engine-trigger:hover,
    .engine-trigger.active {
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.16);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    .engine-trigger:active {
      transform: scale(0.985);
    }

    .engine-icon {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      background: rgba(255, 255, 255, 0.08);
    }

    .engine-label {
      font-size: 0.95rem;
      line-height: 1;
      white-space: nowrap;
      color: rgba(255, 255, 255, 0.95);
    }

    .engine-caret {
      width: 8px;
      height: 8px;
      border-right: 1.5px solid rgba(255, 255, 255, 0.85);
      border-bottom: 1.5px solid rgba(255, 255, 255, 0.85);
      transform: rotate(45deg) translateY(-1px);
      margin-left: 2px;
      opacity: 0.9;
      flex-shrink: 0;
      transition: transform 0.18s ease;
    }

    .engine-trigger.active .engine-caret {
      transform: rotate(225deg) translateY(-1px);
    }

    .engine-menu {
      position: absolute;
      top: calc(100% + 12px);
      right: 10px;
      width: 220px;
      margin: 0;
      padding: 8px;
      list-style: none;
      border-radius: 16px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      background: rgba(10, 16, 24, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.32);
      display: none;
      z-index: 40;
    }

    .engine-menu.visible {
      display: block;
    }

    .engine-option {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      color: white;
      cursor: pointer;
      transition: background 0.16s ease, transform 0.16s ease;
    }

    .engine-option:hover,
    .engine-option.active {
      background: rgba(255, 255, 255, 0.1);
      transform: translateX(2px);
    }

    .engine-option .engine-icon {
      width: 20px;
      height: 20px;
    }

    .quick-result {
      position: absolute;
      top: calc(100% + 12px);
      left: 0;
      width: 100%;
      margin: 0;
      padding: 14px 18px;
      border-radius: 14px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      background: rgba(10, 16, 24, 0.58);
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: 0 16px 38px rgba(0, 0, 0, 0.28);
      display: none;
      z-index: 22;
    }

    .quick-result.visible {
      display: block;
    }

    .quick-result-label {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.58);
      margin-bottom: 6px;
    }

    .quick-result-value {
      font-size: 1.15rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.96);
      word-break: break-word;
    }

    .mode-toast {
      position: absolute;
      left: 50%;
      top: calc(100% + 14px);
      transform: translate(-50%, 8px) scale(0.96);
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(10, 16, 24, 0.64);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.26);
      font-size: 0.84rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.88);
      opacity: 0;
      pointer-events: none;
      transition:
        opacity 0.28s ease,
        transform 0.34s cubic-bezier(.2, .8, .2, 1),
        border-color 0.28s ease,
        background 0.28s ease,
        box-shadow 0.28s ease;
      z-index: 50;
      white-space: nowrap;
    }

    .mode-toast.visible {
      opacity: 1;
      transform: translate(-50%, 0) scale(1);
    }

    .mode-toast.chatgpt {
      background: rgba(8, 22, 18, 0.72);
      border-color: rgba(104, 255, 191, 0.24);
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.28), 0 0 24px rgba(104, 255, 191, 0.08);
      color: rgba(194, 255, 227, 0.94);
    }

    .suggestions {
      position: absolute;
      top: calc(100% + 12px);
      left: 0;
      width: 100%;
      margin: 0;
      padding: 8px;
      list-style: none;
      border-radius: 14px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      background: rgba(10, 16, 24, 0.52);
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: 0 16px 38px rgba(0, 0, 0, 0.28);
      display: none;
      max-height: 280px;
      overflow-y: auto;
      z-index: 20;
    }

    .suggestions.visible {
      display: block;
    }

    .suggestion-item {
      padding: 12px 14px;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      font-size: 0.98rem;
      transition: background 0.16s ease, transform 0.16s ease;
    }

    .suggestion-item:hover,
    .suggestion-item.active {
      background: rgba(255, 255, 255, 0.12);
      transform: translateX(2px);
    }

    .search-input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      color: white;
      font-size: 1.12rem;
      padding: 18px 22px;
      min-width: 0;
      transition: color 0.24s ease, padding 0.30s cubic-bezier(.2, .8, .2, 1), font-size 0.24s ease;
    }

    .search-form.mode-chatgpt .search-input {
      padding-left: 24px;
      font-size: 1.08rem;
      color: rgba(240, 255, 248, 0.98);
    }

    .search-input::placeholder {
      color: rgba(255, 255, 255, 0.72);
      transition: opacity 0.2s ease, color 0.24s ease;
    }

    .search-form.mode-chatgpt .search-input::placeholder {
      color: rgba(194, 255, 227, 0.82);
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="clock" id="clock">00:00:00</div>
    <div class="date" id="date">Onsdag, 25, Marts</div>

    <div class="search-wrap">
      <form class="search-form" id="searchForm">
        <input
          class="search-input"
          id="searchInput"
          type="text"
          placeholder="Search Google..."
          autocomplete="off"
          spellcheck="false"
          autofocus
        />
        <div class="engine-picker" id="enginePicker">
          <button class="engine-trigger" id="engineTrigger" type="button" aria-haspopup="listbox" aria-expanded="false" aria-label="Choose search engine">
            <img class="engine-icon" id="engineTriggerIcon" src="https://www.google.com/favicon.ico" alt="" />
            <span class="engine-label" id="engineTriggerLabel">Google</span>
            <span class="engine-caret"></span>
          </button>
          <ul class="engine-menu" id="engineMenu" role="listbox" aria-label="Search engines"></ul>
        </div>
      </form>
      <div class="quick-result" id="quickResult" aria-live="polite">
        <div class="quick-result-label" id="quickResultLabel">Calculator</div>
        <div class="quick-result-value" id="quickResultValue">0</div>
      </div>
      <div class="mode-toast" id="modeToast">Search</div>
      <ul class="suggestions" id="suggestions"></ul>
    </div>
  </div>

  <script>
    const clock = document.getElementById('clock');
    const dateElement = document.getElementById('date');

    const danishDays = ['Søndag', 'Mandag', 'Tirsdag', 'Onsdag', 'Torsdag', 'Fredag', 'Lørdag'];
    const danishMonths = ['Januar', 'Februar', 'Marts', 'April', 'Maj', 'Juni', 'Juli', 'August', 'September', 'Oktober', 'November', 'December'];

    function updateDateTime() {
      const now = new Date();
      const time = now.toLocaleTimeString('en-GB', {
        hour12: false,
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });

      clock.textContent = time;
      dateElement.textContent = `${danishDays[now.getDay()]}, ${now.getDate()}, ${danishMonths[now.getMonth()]}`;
    }

    updateDateTime();
    setInterval(updateDateTime, 1000);

    const form = document.getElementById('searchForm');
    const input = document.getElementById('searchInput');
    const searchWrap = document.querySelector('.search-wrap');
    const suggestions = document.getElementById('suggestions');
    const quickResult = document.getElementById('quickResult');
    const quickResultLabel = document.getElementById('quickResultLabel');
    const quickResultValue = document.getElementById('quickResultValue');
    const enginePicker = document.getElementById('enginePicker');
    const engineTrigger = document.getElementById('engineTrigger');
    const engineTriggerIcon = document.getElementById('engineTriggerIcon');
    const engineTriggerLabel = document.getElementById('engineTriggerLabel');
    const engineMenu = document.getElementById('engineMenu');
    const modeToast = document.getElementById('modeToast');

    const searchEngines = {
      google: {
        label: 'Google',
        icon: 'https://www.google.com/s2/favicons?domain=google.com&sz=64',
        searchUrl: 'https://www.google.com/search?q=',
        suggest: (query) => jsonpRequest(`https://suggestqueries.google.com/complete/search?client=firefox&q=${encodeURIComponent(query)}`),
        parseSuggestions: (data) => Array.isArray(data?.[1]) ? data[1] : []
      },
      kagi: {
        label: 'Kagi',
        icon: 'https://www.google.com/s2/favicons?domain=kagi.com&sz=64',
        searchUrl: 'https://kagi.com/search?q='
      },
      duckduckgo: {
        label: 'DuckDuckGo',
        icon: 'https://www.google.com/s2/favicons?domain=duckduckgo.com&sz=64',
        searchUrl: 'https://duckduckgo.com/?q=',
        suggest: (query) => fetchJson(`https://ac.duckduckgo.com/ac/?q=${encodeURIComponent(query)}&type=list`),
        parseSuggestions: (data) => Array.isArray(data) ? data.map((item) => typeof item === 'string' ? item : item?.phrase).filter(Boolean) : []
      },
      bing: {
        label: 'Bing',
        icon: 'https://www.google.com/s2/favicons?domain=bing.com&sz=64',
        searchUrl: 'https://www.bing.com/search?q='
      },
      qwant: {
        label: 'Qwant',
        icon: 'https://www.google.com/s2/favicons?domain=qwant.com&sz=64',
        searchUrl: 'https://www.qwant.com/?q='
      }
    };

    let currentEngine = 'google';
    let currentMode = 'search';
    let activeIndex = -1;
    let currentSuggestions = [];
    let debounceTimer;
    let quickResultToken = 0;
    let modeToastTimer;

    const fallbackSuggestions = [
      'YouTube',
      'Gmail',
      'Google Drive',
      'Discord',
      'Instagram',
      'TikTok',
      'Letterboxd',
      'scenepacks',
      'Breaking Bad edits',
      'The Last of Us'
    ];

    function hideSuggestions() {
      suggestions.classList.remove('visible');
      suggestions.innerHTML = '';
      currentSuggestions = [];
      activeIndex = -1;
    }

    function hideQuickResult() {
      searchWrap.classList.remove('has-result');
      quickResult.classList.remove('visible');
    }

    function showQuickResult(label, value) {
      quickResultLabel.textContent = label;
      quickResultValue.textContent = value;
      searchWrap.classList.add('has-result');
      quickResult.classList.add('visible');
    }

    function hideEngineMenu() {
      engineMenu.classList.remove('visible');
      engineTrigger.classList.remove('active');
      engineTrigger.setAttribute('aria-expanded', 'false');
    }

    function showEngineMenu() {
      engineMenu.classList.add('visible');
      engineTrigger.classList.add('active');
      engineTrigger.setAttribute('aria-expanded', 'true');
    }

    function showModeToast(label, isChatGPT) {
      clearTimeout(modeToastTimer);
      modeToast.textContent = label;
      modeToast.classList.toggle('chatgpt', isChatGPT);
      modeToast.classList.add('visible');
      modeToastTimer = setTimeout(() => {
        modeToast.classList.remove('visible');
      }, 900);
    }

    function updateModeUI(showToast = false) {
      const isChatGPT = currentMode === 'chatgpt';
      form.classList.toggle('mode-chatgpt', isChatGPT);
      hideEngineMenu();
      hideSuggestions();
      input.placeholder = isChatGPT ? 'Ask ChatGPT anything…' : `Search ${searchEngines[currentEngine].label}...`;

      if (showToast) {
        showModeToast(isChatGPT ? 'ChatGPT' : 'Search', isChatGPT);
      }
    }

    function toggleMode(forceMode) {
      currentMode = forceMode || (currentMode === 'search' ? 'chatgpt' : 'search');
      updateModeUI(true);
      focusSearchInput(false);
    }

    function setEngine(engineKey) {
      const selectedEngine = searchEngines[engineKey] || searchEngines.google;
      currentEngine = engineKey in searchEngines ? engineKey : 'google';
      engineTriggerIcon.src = selectedEngine.icon;
      engineTriggerLabel.textContent = selectedEngine.label;
      if (currentMode === 'search') {
        input.placeholder = `Search ${selectedEngine.label}...`;
      }

      [...engineMenu.children].forEach((item) => {
        const isActive = item.dataset.engine === currentEngine;
        item.classList.toggle('active', isActive);
        item.setAttribute('aria-selected', isActive ? 'true' : 'false');
      });
    }

    function buildEngineMenu() {
      engineMenu.innerHTML = Object.entries(searchEngines)
        .map(([key, engine]) => `
          <li class="engine-option${key === currentEngine ? ' active' : ''}" data-engine="${key}" role="option" aria-selected="${key === currentEngine}">
            <img class="engine-icon" src="${engine.icon}" alt="" />
            <span>${engine.label}</span>
          </li>
        `)
        .join('');
    }

    function performSearch(query) {
      const cleanQuery = String(query || '').trim();
      if (!cleanQuery) return;
      hideSuggestions();
      const selectedEngine = searchEngines[currentEngine] || searchEngines.google;
      const url = `${selectedEngine.searchUrl}${encodeURIComponent(cleanQuery)}`;
      window.location.href = url;
    }

    function openChatGPTWithPrompt(prompt) {
      const cleanPrompt = String(prompt || '').trim();
      const url = cleanPrompt
        ? 'https://chatgpt.com/?q=' + encodeURIComponent(cleanPrompt)
        : 'https://chatgpt.com/';
      window.location.href = url;
    }

    function renderSuggestions(items) {
      currentSuggestions = items.slice(0, 8);
      activeIndex = -1;

      if (!currentSuggestions.length) {
        hideSuggestions();
        return;
      }

      suggestions.innerHTML = currentSuggestions
        .map((item, index) => '<li class="suggestion-item" data-index="' + index + '">' + item + '</li>')
        .join('');

      suggestions.classList.add('visible');
    }

    function formatResultNumber(value) {
      return new Intl.NumberFormat('da-DK', {
        maximumFractionDigits: 8
      }).format(value);
    }

    function evaluateMathExpression(query) {
      const raw = query.trim();
      const normalized = raw.replace(/[×x]/gi, '*');

      if (!raw || /[a-z]/i.test(normalized.replace(/\b(?:sqrt|pi)\b/gi, ''))) {
        return null;
      }

      if (!/[0-9]/.test(raw)) {
        return null;
      }

      let expression = normalized
        .replace(/,/g, '.')
        .replace(/÷/g, '/')
        .replace(/\^/g, '**')
        .replace(/(\d+(?:\.\d+)?)%/g, function (_, n) { return '(' + n + '/100)'; })
        .replace(/\bpi\b/gi, 'Math.PI')
        .replace(/\bsqrt\s*\(/gi, 'Math.sqrt(')
        .replace(/\s+/g, '');

      const expressionWithoutMath = expression
        .replace(/Math\.PI/g, '1')
        .replace(/Math\.sqrt/g, '1');

      if (/[^0-9+\-*/().]/.test(expressionWithoutMath)) {
        return null;
      }

      try {
        const result = Function('"use strict"; return (' + expression + ');')();
        if (typeof result !== 'number' || !Number.isFinite(result)) {
          return null;
        }
        return result;
      } catch (error) {
        return null;
      }
    }

    async function fetchCurrencyConversion(amount, from, to) {
      const response = await fetch(
        'https://api.frankfurter.app/latest?amount=' +
          encodeURIComponent(amount) +
          '&from=' +
          encodeURIComponent(from) +
          '&to=' +
          encodeURIComponent(to),
        {
          method: 'GET',
          mode: 'cors',
          credentials: 'omit'
        }
      );

      if (!response.ok) {
        throw new Error('Conversion request failed');
      }

      const data = await response.json();
      return data && data.rates ? (data.rates[to] ?? null) : null;
    }

    async function updateQuickResult(query) {
      const token = ++quickResultToken;
      const trimmed = query.trim();

      if (!trimmed) {
        hideQuickResult();
        return;
      }

      const currencyMatch = trimmed.match(/^(\d+(?:[.,]\d+)?)\s*([a-zA-Z]{3})\s+(?:to|in)\s+([a-zA-Z]{3})$/i);
      if (currencyMatch) {
        const amount = Number(currencyMatch[1].replace(',', '.'));
        const from = currencyMatch[2].toUpperCase();
        const to = currencyMatch[3].toUpperCase();

        if (Number.isFinite(amount)) {
          showQuickResult('Converter', 'Loading…');
          try {
            const converted = await fetchCurrencyConversion(amount, from, to);
            if (token !== quickResultToken) return;
            if (converted !== null) {
              showQuickResult('Converter', formatResultNumber(amount) + ' ' + from + ' = ' + formatResultNumber(converted) + ' ' + to);
              return;
            }
          } catch (error) {
          }
        }
      }

      const mathResult = evaluateMathExpression(trimmed);
      if (mathResult !== null) {
        if (token !== quickResultToken) return;
        showQuickResult('Calculator', formatResultNumber(mathResult));
        return;
      }

      if (token === quickResultToken) {
        hideQuickResult();
      }
    }

    function jsonpRequest(url) {
      return new Promise((resolve, reject) => {
        const callbackName = `suggestCallback_${Date.now()}_${Math.floor(Math.random() * 10000)}`;
        const script = document.createElement('script');
        const timeout = setTimeout(() => {
          cleanup();
          reject(new Error('Suggestion request timed out'));
        }, 2500);

        function cleanup() {
          clearTimeout(timeout);
          delete window[callbackName];
          script.remove();
        }

        window[callbackName] = (data) => {
          cleanup();
          resolve(data);
        };

        script.onerror = () => {
          cleanup();
          reject(new Error('Suggestion request failed'));
        };

        script.src = `${url}&callback=${callbackName}`;
        document.body.appendChild(script);
      });
    }

    async function fetchJson(url) {
      const response = await fetch(url, {
        method: 'GET',
        mode: 'cors',
        credentials: 'omit'
      });

      if (!response.ok) {
        throw new Error('Suggestion request failed');
      }

      return response.json();
    }

    async function fetchSuggestions(query) {
      if (currentMode !== 'search') {
        hideSuggestions();
        return;
      }

      const selectedEngine = searchEngines[currentEngine] || searchEngines.google;

      try {
        if (selectedEngine.suggest) {
          const data = await selectedEngine.suggest(query);
          const liveSuggestions = selectedEngine.parseSuggestions ? selectedEngine.parseSuggestions(data) : [];

          if (liveSuggestions.length) {
            renderSuggestions(liveSuggestions);
            return;
          }
        }
      } catch (error) {
      }

      try {
        const googleData = await searchEngines.google.suggest(query);
        const googleSuggestions = searchEngines.google.parseSuggestions(googleData);

        if (googleSuggestions.length) {
          renderSuggestions(googleSuggestions);
          return;
        }
      } catch (error) {
      }

      const filtered = fallbackSuggestions.filter((item) =>
        item.toLowerCase().includes(query.toLowerCase())
      );
      renderSuggestions(filtered);
    }

    input.addEventListener('input', () => {
      const query = input.value.trim();

      clearTimeout(debounceTimer);
      updateQuickResult(query);

      if (currentMode !== 'search') {
        hideSuggestions();
        return;
      }

      if (!query) {
        hideSuggestions();
        return;
      }

      debounceTimer = setTimeout(() => {
        fetchSuggestions(query);
      }, 120);
    });

    input.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        if (currentMode === 'chatgpt') {
          openChatGPTWithPrompt(input.value);
        } else if (activeIndex >= 0 && currentSuggestions.length) {
          input.value = currentSuggestions[activeIndex];
          performSearch(input.value);
        } else {
          performSearch(input.value);
        }
        return;
      }

      if (!currentSuggestions.length || currentMode !== 'search') return;

      if (event.key === 'ArrowDown') {
        event.preventDefault();
        activeIndex = (activeIndex + 1) % currentSuggestions.length;
      } else if (event.key === 'ArrowUp') {
        event.preventDefault();
        activeIndex = (activeIndex - 1 + currentSuggestions.length) % currentSuggestions.length;
      } else if (event.key === 'Escape') {
        hideSuggestions();
        return;
      } else {
        return;
      }

      [...suggestions.children].forEach((item, index) => {
        item.classList.toggle('active', index === activeIndex);
      });
    });

    suggestions.addEventListener('mousedown', (event) => {
      event.preventDefault();
      const item = event.target.closest('.suggestion-item');
      if (!item) return;

      const chosen = currentSuggestions[Number(item.dataset.index)] || input.value;
      input.value = chosen;
      performSearch(chosen);
    });

    document.addEventListener('click', (event) => {
      if (!event.target.closest('.search-wrap')) {
        hideSuggestions();
      }

      if (!event.target.closest('.engine-picker')) {
        hideEngineMenu();
      }
    });

    document.addEventListener('keydown', (event) => {
      if (event.ctrlKey && event.code === 'Space') {
        event.preventDefault();
        toggleMode();
      }
    });

    engineTrigger.addEventListener('click', (event) => {
      event.stopPropagation();
      if (engineMenu.classList.contains('visible')) {
        hideEngineMenu();
      } else {
        showEngineMenu();
      }
    });

    engineMenu.addEventListener('mousedown', (event) => {
      event.preventDefault();
      const option = event.target.closest('.engine-option');
      if (!option) return;

      setEngine(option.dataset.engine);
      hideEngineMenu();

      const query = input.value.trim();
      if (query) {
        fetchSuggestions(query);
      } else {
        hideSuggestions();
      }
    });

    function focusSearchInput(selectAll = true) {
      requestAnimationFrame(() => {
        input.focus({ preventScroll: true });
        if (selectAll) {
          input.select();
        } else {
          const end = input.value.length;
          input.setSelectionRange(end, end);
        }
      });
    }

    function routeTypingToSearch(event) {
      if (event.defaultPrevented || event.ctrlKey || event.metaKey || event.altKey) {
        return;
      }

      const target = event.target;
      const isEditable =
        target instanceof HTMLElement &&
        (
          target === input ||
          target.tagName === 'TEXTAREA' ||
          (target.tagName === 'INPUT' && target !== engineTrigger) ||
          target.isContentEditable
        );

      if (isEditable) {
        return;
      }

      const isPrintable = event.key.length === 1;
      const isBackspace = event.key === 'Backspace';

      if (!isPrintable && !isBackspace) {
        return;
      }

      event.preventDefault();
      focusSearchInput(false);

      if (isPrintable) {
        const start = input.selectionStart ?? input.value.length;
        const end = input.selectionEnd ?? input.value.length;
        input.setRangeText(event.key, start, end, 'end');
      } else if (isBackspace) {
        const start = input.selectionStart ?? input.value.length;
        const end = input.selectionEnd ?? input.value.length;
        if (start !== end) {
          input.setRangeText('', start, end, 'end');
        } else if (start > 0) {
          input.setRangeText('', start - 1, start, 'end');
        }
      }

      input.dispatchEvent(new Event('input', { bubbles: true }));
    }

    buildEngineMenu();
    setEngine(currentEngine);
    updateModeUI(false);
    focusSearchInput();
    setTimeout(() => focusSearchInput(), 150);
    setTimeout(() => focusSearchInput(), 400);

    window.addEventListener('pageshow', () => focusSearchInput());
    window.addEventListener('focus', () => focusSearchInput());
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        focusSearchInput();
      }
    });
    document.addEventListener('keydown', routeTypingToSearch, true);

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      if (currentMode === 'chatgpt') {
        openChatGPTWithPrompt(input.value);
      } else {
        performSearch(input.value);
      }
    });
  </script>
</body>
</html>
