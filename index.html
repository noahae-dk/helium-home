  <title>Helium Homepage</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --accent-rgb: 104, 255, 191;
      --accent-text-rgb: 194, 255, 227;
    }

    body {
      --accent-rgb: 104, 255, 191;
      --accent-text-rgb: 194, 255, 227;
    }

    body.crowbar-mode {
      --accent-rgb: 255, 166, 74;
      --accent-text-rgb: 255, 224, 182;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      overflow: hidden;
      background: #05070a;
      color-scheme: dark;
    }

    body {
      background-color: #ffffff;
      background-image: none;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      position: relative;
      color: white;
      touch-action: manipulation;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.18), rgba(0, 0, 0, 0.06));
      pointer-events: none;
      transition: opacity 0.28s ease;
    }

    body::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(120% 90% at 50% 110%, rgba(var(--accent-rgb), 0.11), transparent 58%),
        radial-gradient(140% 120% at 50% -20%, rgba(var(--accent-rgb), 0.04), transparent 62%);
      opacity: 0;
      transition: opacity 0.42s ease, background 0.42s ease;
    }

    body.crowbar-mode::after {
      opacity: 1;
    }

    body.solid-background::before {
      opacity: 0;
    }

    .overlay {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      padding: 24px;
    }

    .clock {
      font-size: 2.7rem;
      font-weight: 600;
      letter-spacing: 0.04em;
            user-select: none;
      line-height: 1;
      margin-bottom: 8px;
    }

    .date {
      font-size: 1.18rem;
      font-weight: 600;
      letter-spacing: 0.02em;
            user-select: none;
      color: rgba(255, 255, 255, 0.92);
    }

    .weather-line {
      transition:
        opacity 0.28s ease,
        filter 0.34s ease,
        transform 0.34s cubic-bezier(.2, .8, .2, 1),
        max-height 0.34s cubic-bezier(.2, .8, .2, 1),
        margin-top 0.28s ease;
      overflow: hidden;
      opacity: 1;
      filter: blur(0);
      transform: translateY(0);
      pointer-events: auto;
      max-height: 28px;
      font-size: 0.98rem;
      font-weight: 600;
      letter-spacing: 0.02em;
            user-select: none;
      color: rgba(255, 255, 255, 0.84);
      margin-top: 6px;
      min-height: 1.25em;
      max-width: min(360px, calc(100vw - 48px));
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .weather-line.is-hidden {
      opacity: 0;
      filter: blur(10px);
      transform: translateY(-6px);
      max-height: 0;
      margin-top: 0;
      pointer-events: none;
    }

        .ambient-particles {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 1;
    }

    .ambient-particle {
      position: absolute;
      border-radius: 999px;
      background:
        radial-gradient(circle at 35% 35%, rgba(255,255,255,0.58), rgba(255,255,255,0.20) 42%, transparent 74%);
      opacity: 0;
      filter: blur(0.38px);
      box-shadow:
        0 0 8px rgba(255,255,255,0.10),
        0 0 18px rgba(255,255,255,0.06);
      will-change: transform, opacity, filter;
      animation:
        sporeDrift var(--drift, 16s) linear infinite,
        sporePulse var(--pulse, 6s) ease-in-out infinite;
      animation-delay: var(--delay, 0s), var(--pulse-delay, 0s);
    }

    .ambient-particle.is-green {
      background:
        radial-gradient(circle at 35% 35%, rgba(var(--accent-text-rgb), 0.50), rgba(var(--accent-rgb), 0.22) 46%, transparent 74%);
      filter: blur(0.45px);
      box-shadow:
        0 0 10px rgba(var(--accent-rgb), 0.14),
        0 0 22px rgba(var(--accent-rgb), 0.08);
    }

    body.solid-background:not(.dark-solid) .ambient-particle {
      background:
        radial-gradient(circle at 35% 35%, rgba(74,82,94,0.34), rgba(74,82,94,0.12) 42%, transparent 74%);
      box-shadow:
        0 0 8px rgba(74,82,94,0.08),
        0 0 16px rgba(74,82,94,0.05);
    }

    body.solid-background:not(.dark-solid) .ambient-particle.is-green {
      background:
        radial-gradient(circle at 35% 35%, rgba(102, 232, 182, 0.42), rgba(74, 190, 144, 0.16) 46%, transparent 74%);
      box-shadow:
        0 0 10px rgba(74, 190, 144, 0.12),
        0 0 22px rgba(74, 190, 144, 0.06);
    }

    @keyframes sporeDrift {
      0% {
        transform: translate3d(0, 0, 0) scale(0.92);
        opacity: 0;
      }
      8% {
        opacity: var(--opacity, 0.22);
      }
      45% {
        opacity: calc(var(--opacity, 0.22) * 0.96);
      }
      100% {
        transform: translate3d(var(--drift-x, 16px), var(--drift-y, -120px), 0) scale(1.12);
        opacity: 0;
      }
    }

    @keyframes sporePulse {
      0%, 100% {
        filter: blur(0.35px) brightness(1);
      }
      50% {
        filter: blur(1px) brightness(1.12);
      }
    }

.clock,
    .date,
    .weather-line,
    .search-wrap {
      position: relative;
      z-index: 2;
    }

    .clock,
    .date,
    .weather-line {
      color: rgba(255, 255, 255, 0.96);
      text-shadow:
        0 0 6px rgba(0, 0, 0, 0.45),
        0 0 14px rgba(0, 0, 0, 0.28),
        0 0 28px rgba(0, 0, 0, 0.16);
      background: transparent;
      box-shadow: none;
      filter: none;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .weather-line {
      color: rgba(255, 255, 255, 0.88);
    }

    body.solid-background:not(.dark-solid) .clock,
    body.solid-background:not(.dark-solid) .date,
    body.solid-background:not(.dark-solid) .weather-line {
      color: rgba(46, 54, 64, 0.95);
      text-shadow:
        0 1px 0 rgba(255, 255, 255, 0.62),
        0 8px 20px rgba(0, 0, 0, 0.10),
        0 18px 38px rgba(0, 0, 0, 0.06);
      background: transparent;
      box-shadow: none;
      filter: none;
    }

    body.solid-background:not(.dark-solid) .weather-line {
      color: rgba(60, 68, 78, 0.88);
    }

    body.solid-background.dark-solid .clock,
    body.solid-background.dark-solid .date,
    body.solid-background.dark-solid .weather-line {
      color: rgba(255, 255, 255, 0.96);
      text-shadow:
        0 0 6px rgba(0, 0, 0, 0.52),
        0 0 14px rgba(0, 0, 0, 0.36),
        0 0 28px rgba(0, 0, 0, 0.22);
      background: transparent;
      box-shadow: none;
      filter: none;
    }

    body.solid-background.dark-solid .weather-line {
      color: rgba(255, 255, 255, 0.88);
    }


    .search-wrap.has-result .suggestions {
      top: calc(100% + 104px);
    }

    .quick-result-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
    }

    .quick-result-copy {
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.94);
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transform: translateY(2px) scale(0.98);
      transition:
        opacity 0.18s ease,
        transform 0.18s ease,
        background 0.18s ease,
        border-color 0.18s ease,
        box-shadow 0.18s ease;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .quick-result.is-copyable .quick-result-copy {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0) scale(1);
    }

    .quick-result-copy:hover {
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.18);
      box-shadow: 0 8px 18px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .quick-result-copy:active,
    .quick-result-copy.is-copied {
      transform: translateY(0) scale(0.96);
    }

    .search-wrap {
      width: min(820px, calc(100vw - 48px));
      position: absolute;
      top: 42%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .search-wrap.has-result .suggestions {
      top: calc(100% + 96px);
    }

    .search-form {
      display: flex;
      align-items: center;
      position: relative;
      z-index: 30;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      background: rgba(10, 16, 24, 0.40);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 18px;
      box-shadow: 0 12px 34px rgba(0, 0, 0, 0.24);
      overflow: visible;
      transition:
        transform 0.34s cubic-bezier(.2, .8, .2, 1),
        box-shadow 0.34s cubic-bezier(.2, .8, .2, 1),
        background 0.34s cubic-bezier(.2, .8, .2, 1),
        border-color 0.34s cubic-bezier(.2, .8, .2, 1),
        filter 0.34s cubic-bezier(.2, .8, .2, 1);
    }

    .search-form::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background:
        linear-gradient(
          90deg,
          transparent 0%,
          transparent 16%,
          rgba(255,255,255,0.045) 30%,
          rgba(255,255,255,0.03) 42%,
          transparent 58%,
          transparent 78%,
          rgba(255,255,255,0.02) 100%
        ),
        radial-gradient(
          120% 100% at 38% 50%,
          rgba(255,255,255,0.045) 0%,
          transparent 42%
        );
      opacity: 0.72;
      pointer-events: none;
      transition: opacity 0.34s ease, transform 0.34s ease;
    }

    .search-form:hover {
      transform: translateY(-3px) scale(1.012);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.30);
      border-color: rgba(255, 255, 255, 0.22);
      background: rgba(12, 18, 28, 0.48);
      filter: saturate(1.05);
    }

    .search-form:hover::before {
      opacity: 0.95;
      transform: translateX(3px);
    }

    .search-form:focus-within {
      transform: translateY(-4px) scale(1.016);
      box-shadow: 0 20px 48px rgba(0, 0, 0, 0.34);
      border-color: rgba(255, 255, 255, 0.28);
      background: rgba(14, 20, 32, 0.54);
    }

    .search-form:focus-within::before {
      opacity: 0.88;
      transform: translateX(2px);
    }

    .search-form.mode-chatgpt {
      background: rgba(9, 22, 18, 0.56);
      border-color: rgba(var(--accent-rgb), 0.22);
      box-shadow:
        0 20px 48px rgba(0, 0, 0, 0.34),
        0 0 0 1px rgba(var(--accent-rgb), 0.07) inset,
        0 0 44px rgba(var(--accent-rgb), 0.06);
    }

    .search-form.mode-chatgpt::before {
      background:
        linear-gradient(
          90deg,
          transparent 0%,
          transparent 22%,
          rgba(var(--accent-rgb), 0.05) 36%,
          rgba(var(--accent-rgb), 0.035) 48%,
          transparent 64%,
          transparent 82%,
          rgba(var(--accent-rgb), 0.025) 100%
        ),
        radial-gradient(
          120% 100% at 44% 50%,
          rgba(var(--accent-rgb), 0.075) 0%,
          transparent 42%
        );
    }

    .search-form.mode-chatgpt:hover,
    .search-form.mode-chatgpt:focus-within {
      background: rgba(10, 24, 19, 0.62);
      border-color: rgba(var(--accent-rgb), 0.30);
      box-shadow:
        0 22px 52px rgba(0, 0, 0, 0.36),
        0 0 0 1px rgba(var(--accent-rgb), 0.10) inset,
        0 0 58px rgba(var(--accent-rgb), 0.10);
    }


    .mode-sparkles {
      position: absolute;
      inset: -22px;
      pointer-events: none;
      overflow: visible;
      z-index: 45;
    }

    .mode-sparkle {
      position: absolute;
      width: 10px;
      height: 10px;
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.4) rotate(0deg);
      animation: modeSparkleBurst 760ms cubic-bezier(.2, .8, .2, 1) forwards;
      filter: drop-shadow(0 0 10px rgba(var(--accent-rgb), 0.25));
    }

    .mode-sparkle::before,
    .mode-sparkle::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 2px;
      height: 10px;
      border-radius: 999px;
      background: rgba(var(--accent-text-rgb), 0.95);
      transform: translate(-50%, -50%);
      box-shadow: 0 0 10px rgba(var(--accent-rgb), 0.18);
    }

    .mode-sparkle::after {
      transform: translate(-50%, -50%) rotate(90deg);
    }

    .mode-sparkle.is-soft::before,
    .mode-sparkle.is-soft::after {
      height: 8px;
      background: rgba(255, 255, 255, 0.85);
    }

    @keyframes modeSparkleBurst {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.35) rotate(0deg);
      }
      18% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.05) rotate(28deg);
      }
      100% {
        opacity: 0;
        transform: translate(calc(-50% + var(--sparkle-x, 0px)), calc(-50% + var(--sparkle-y, 0px))) scale(0.72) rotate(70deg);
      }
    }

    .search-form.is-mode-switching {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 22px 52px rgba(0, 0, 0, 0.34);
      border-color: rgba(255, 255, 255, 0.24);
    }

    .search-form.mode-chatgpt.is-mode-switching {
      border-color: rgba(var(--accent-rgb), 0.30);
      box-shadow:
        0 22px 52px rgba(0, 0, 0, 0.36),
        0 0 0 1px rgba(var(--accent-rgb), 0.10) inset,
        0 0 34px rgba(var(--accent-rgb), 0.10);
    }

    .search-form.is-mode-switching::before {
      opacity: 0.98;
      transform: translateX(8px) scale(1.03, 1.015);
      filter: saturate(1.12);
    }

    .search-form.mode-chatgpt.is-mode-switching::before {
      opacity: 1;
      transform: translateX(10px) scale(1.035, 1.02);
      filter: saturate(1.16);
    }

    .search-form.is-pressed {
      transform: translateY(-2px) scale(1.008);
    }

    .search-form.is-pressed::before {
      opacity: 0.92;
      transform: translateX(6px) scale(1.01, 0.995);
    }

    .engine-picker {
      position: relative;
      flex-shrink: 0;
      padding-right: 10px;
      display: inline-flex;
      transition: opacity 0.24s ease, transform 0.30s cubic-bezier(.2, .8, .2, 1);
    }

    .search-form.mode-chatgpt .engine-picker {
      display: none;
      opacity: 0;
      transform: translateX(14px) scale(0.96);
      pointer-events: none;
    }

    .engine-trigger {
      display: inline-flex;
      align-items: center;
      gap: 0;
      height: 50px;
      width: 54px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      outline: none;
      background: rgba(255, 255, 255, 0.08);
      color: white;
      padding: 0 10px;
      cursor: pointer;
      border-radius: 999px;
      overflow: hidden;
      transition:
        width 0.24s cubic-bezier(.2, .8, .2, 1),
        padding 0.24s cubic-bezier(.2, .8, .2, 1),
        gap 0.24s cubic-bezier(.2, .8, .2, 1),
        background 0.22s ease,
        border-color 0.22s ease,
        transform 0.22s ease,
        box-shadow 0.22s ease,
        opacity 0.22s ease;
      justify-content: flex-start;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .engine-trigger:hover,
    .engine-trigger.active {
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.16);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    .engine-trigger.active {
    }

    .engine-trigger:active { transform: scale(0.985); }

    .engine-icon {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      background: rgba(255, 255, 255, 0.08);
    }

    .engine-label {
      display: none;
      font-size: 0.95rem;
      line-height: 1.22;
      white-space: nowrap;
      color: rgba(255, 255, 255, 0.95);
      max-width: 0;
      opacity: 0;
      overflow: hidden;
      text-overflow: clip;
      padding-bottom: 3px;
      transform: translateX(-6px);
      transition:
        max-width 0.24s cubic-bezier(.2, .8, .2, 1),
        opacity 0.18s ease,
        transform 0.24s cubic-bezier(.2, .8, .2, 1);
    }

    .engine-trigger.active .engine-label {
      max-width: var(--engine-trigger-label-width, 90px);
      opacity: 1;
      transform: translateX(0);
    }

    .engine-caret {
      width: 8px;
      height: 8px;
      border-right: 1.5px solid rgba(255, 255, 255, 0.85);
      border-bottom: 1.5px solid rgba(255, 255, 255, 0.85);
      transform: rotate(45deg) translateY(-1px);
      margin-left: auto;
      opacity: 0.9;
      flex-shrink: 0;
      transition: transform 0.18s ease, opacity 0.18s ease;
    }

    .engine-trigger.active .engine-caret {
      transform: rotate(225deg) translateY(-1px);
    }

    .engine-menu {
      position: absolute;
      top: calc(100% + 12px);
      right: 10px;
      width: 220px;
      margin: 0;
      padding: 8px;
      list-style: none;
      border-radius: 16px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      background: rgba(10, 16, 24, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.32);
      display: none;
      z-index: 40;
    }

    .engine-menu.visible {
      display: block;
      animation: pickerMenuIn 0.18s cubic-bezier(.2, .8, .2, 1);
      transform-origin: top right;
    }

    .engine-menu.closing {
      display: block;
      animation: pickerMenuOut 0.16s cubic-bezier(.2, .8, .2, 1) forwards;
      transform-origin: top right;
      pointer-events: none;
    }

    .engine-option {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      color: white;
      cursor: pointer;
      transition: background 0.16s ease, transform 0.16s ease;
    }

    .engine-option:hover,
    .engine-option.active {
      background: rgba(255, 255, 255, 0.1);
      transform: translateX(2px);
    }

    .engine-option .engine-icon {
      width: 20px;
      height: 20px;
    }

    .engine-option + .engine-option {
      margin-top: 6px;
    }

    .quick-result {
      position: absolute;
      top: calc(100% + 12px);
      left: 0;
      width: 100%;
      margin: 0;
      padding: 14px 18px;
      border-radius: 14px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      background: rgba(10, 16, 24, 0.58);
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: 0 16px 38px rgba(0, 0, 0, 0.28);
      z-index: 22;
      opacity: 0;
      transform: translateY(8px) scale(0.985);
      pointer-events: none;
      transition:
        opacity 0.22s ease,
        transform 0.26s cubic-bezier(.2, .8, .2, 1);
    }

    .quick-result.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

      .map(([alias, key]) => {
        const hasLetters = /[a-z]/i.test(alias);
        const pattern = hasLetters
          ? new RegExp('\\b' + alias.split(/\s+/).map(escapeRegExp).join('\\s+') + '\\b', 'gi')
          : new RegExp(escapeRegExp(alias), 'g');
        return { alias, key, pattern };

    function extractUnitMentions(query) {
      const text = String(query || '').toLowerCase();
      const matches = [];

      for (const entry of unitAliasEntries) {
        entry.pattern.lastIndex = 0;
        let match;
        while ((match = entry.pattern.exec(text)) !== null) {
          matches.push({ start: match.index, end: match.index + match[0].length, key: entry.key });
          if (!match[0].length) entry.pattern.lastIndex += 1;
        }
      }

      matches.sort((a, b) => a.start !== b.start ? a.start - b.start : (b.end - b.start) - (a.end - a.start));

      const filtered = [];
      for (const match of matches) {
        const overlaps = filtered.some((kept) => !(match.end <= kept.start || match.start >= kept.end));
        if (!overlaps) filtered.push(match);
      }

      return filtered;
    }

    function parseTimezoneLookup(query) {
      const trimmed = stripQuickPrefixes(query).trim();
      if (!trimmed || currentMode !== 'search') return null;

      const patterns = [
        /^(?:what\s+time\s+is\s+it\s+in|what\s+time\s+is\s+it\s+at|time\s+in|time\s+at|current\s+time\s+in|timezone\s+in|timezone\s+for|time\s+zone\s+in|clock\s+in)\s+(.+)$/i,

        /^(.+?)\s+time$/i
      ];

      for (const pattern of patterns) {
        const match = trimmed.match(pattern);
        if (match && match[1] && match[1].trim().length >= 2) return match[1].trim();
      }

      return null;
    }

    async function fetchTimezoneLocation(locationName) {
      const key = String(locationName || '').trim().toLowerCase();
      if (!key) return null;
      if (timezoneLookupCache.has(key)) return timezoneLookupCache.get(key);

      const response = await fetch(
        'https://geocoding-api.open-meteo.com/v1/search?name=' + encodeURIComponent(locationName) + '&count=1&language=en&format=json',
        { method: 'GET', mode: 'cors', credentials: 'omit', cache: 'force-cache' }
      );
      if (!response.ok) throw new Error('Timezone lookup failed');
      const data = await response.json();
      const result = Array.isArray(data?.results) ? data.results[0] : null;
      timezoneLookupCache.set(key, result || null);
      return result || null;
    }

    function formatTimezoneQuickResult(place) {
      if (!place || !place.timezone) return null;
      const now = new Date();
      const parts = new Intl.DateTimeFormat('en-GB', {
        timeZone: place.timezone,
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false,
        timeZoneName: 'short'
      }).formatToParts(now);

      return {
        label: [place.name, place.country].filter(Boolean).join(', '),
        value: parts.map((part) => part.value).join('')
      };
    }

    function buildAmbientParticles() {
      if (!ambientParticles) return;
      ambientParticles.innerHTML = '';

      const count = 28;
      const nowMs = Date.now();

      for (let index = 0; index < count; index += 1) {
        const particle = document.createElement('span');

        const size = 5 + seededUnit(index, 1) * 9;
        const driftX = (seededUnit(index, 2) * 62) - 31;
        const driftY = -(130 + seededUnit(index, 3) * 240);
        const left = seededUnit(index, 4) * 100;
        const top = 52 + seededUnit(index, 5) * 44;
        const durationMs = 15000 + seededUnit(index, 6) * 17000;
        const pulseMs = 4800 + seededUnit(index, 7) * 4200;
        const opacity = 0.14 + seededUnit(index, 8) * 0.18;
        const phaseMs = nowMs % durationMs;
        const pulsePhaseMs = nowMs % pulseMs;

        particle.className = 'ambient-particle' + (seededUnit(index, 9) > 0.36 ? ' is-green' : '');
        particle.style.width = size.toFixed(2) + 'px';
        particle.style.height = size.toFixed(2) + 'px';
        particle.style.left = left.toFixed(2) + '%';
        particle.style.top = top.toFixed(2) + '%';
        particle.style.setProperty('--drift-x', driftX.toFixed(1) + 'px');
        particle.style.setProperty('--drift-y', driftY.toFixed(1) + 'px');
        particle.style.setProperty('--drift', (durationMs / 1000).toFixed(2) + 's');
        particle.style.setProperty('--pulse', (pulseMs / 1000).toFixed(2) + 's');
        particle.style.setProperty('--delay', '-' + (phaseMs / 1000).toFixed(2) + 's');
        particle.style.setProperty('--pulse-delay', '-' + (pulsePhaseMs / 1000).toFixed(2) + 's');
        particle.style.setProperty('--opacity', opacity.toFixed(2));
        ambientParticles.appendChild(particle);
      }
    }

    function looksLikeDirectUrl(value) {
      const query = String(value || '').trim();
      if (!query || /\s/.test(query) || query.includes('@')) {

      return /^(?:(?:https?):\/\/)?(?:localhost|\d{1,3}(?:\.\d{1,3}){3}|(?:[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?\.)+[a-z]{2,24})(?::\d{2,5})?(?:[/?#][^\s]*)?$/i.test(query);

    function normalizeDirectUrl(value) {
      const query = String(value || '').trim();
      if (/^https?:\/\//i.test(query)) {

      const cleanQuery = String(query || '').trim();

      hideSuggestions();

      if (looksLikeDirectUrl(cleanQuery)) {

        return;

      const selectedEngine = searchEngines[currentEngine] || searchEngines.google;
      const url = `${selectedEngine.searchUrl}${encodeURIComponent(cleanQuery)}`;

    async function copyTextToClipboard(text) {
      const value = String(text || '');
      if (!value) return false;

      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(value);
          return true;
        }
      } catch (error) {
      }

      try {
        const helper = document.createElement('textarea');
        helper.value = value;
        helper.setAttribute('readonly', '');
        helper.style.position = 'fixed';
        helper.style.opacity = '0';
        helper.style.pointerEvents = 'none';
        helper.style.left = '-9999px';
        document.body.appendChild(helper);
        helper.focus();
        helper.select();
        const success = document.execCommand('copy');
        helper.remove();
        return !!success;
      } catch (error) {
        return false;
      }
    }

    async function openSelectedAIWithPrompt(prompt) {
      const selected = aiProviders[currentAI] || aiProviders.chatgpt;

        return;

      const copied = await copyTextToClipboard(clean);
      if (copied && clean) {

      setTimeout(() => {
        window.location.href = selected.launch(clean);
      }, copied && clean ? 120 : 0);

        if (a.start !== b.start) return a.start - b.start;
        return (b.end - b.start) - (a.end - a.start);

      const filtered = [];
      for (const match of matches) {
        const overlaps = filtered.some((kept) => !(match.end <= kept.start || match.start >= kept.end));

        .replace(/^\s*(?:what\s+is|what's|whats|hvad\s+er)\s+/i, '')
        .trim();
    }

    function shouldKeepSuggestionsAlongsideQuickResult(query, detected) {
      if (!detected || detected.kind === 'none') {
        return false;
      }

      const trimmed = stripQuickPrefixes(query).trim().toLowerCase();
      return detected.kind === 'math' && trimmed === 'pi';
    }

    function detectQuickResultQuery(query) {
      const trimmed = stripQuickPrefixes(query);
      if (!trimmed || currentMode !== 'search') {
        return { kind: 'none' };
      }

      const timezoneLocation = parseTimezoneLookup(query);
      if (timezoneLocation) {
        return { kind: 'timezone', location: timezoneLocation };
      }

      const amountMatch = trimmed.match(/-?\d(?:[\d.,\s]*\d)?(?:[.,]\d+)?|-?\d/);
      const amount = amountMatch ? parseFlexibleNumber(amountMatch[0]) : NaN;
      const mentions = extractCurrencyMentions(trimmed);
      const uniqueCodes = [];

      for (const mention of mentions) {
        if (!uniqueCodes.includes(mention.code)) {
          uniqueCodes.push(mention.code);
        }
      }

      if (Number.isFinite(amount) && uniqueCodes.length >= 2 && uniqueCodes[0] !== uniqueCodes[1]) {
        return {
          kind: 'currency',
          amount,
          from: uniqueCodes[0],
          to: uniqueCodes[1]
        };
      }

      const unitMentions = extractUnitMentions(trimmed);
      const uniqueUnits = [];
      for (const mention of unitMentions) {
        if (!uniqueUnits.includes(mention.key)) uniqueUnits.push(mention.key);
      }

      if (Number.isFinite(amount) && uniqueUnits.length >= 2) {
        const fromUnit = unitDefinitions[uniqueUnits[0]];
        const toUnit = unitDefinitions[uniqueUnits[1]];
        if (fromUnit && toUnit && fromUnit.category === toUnit.category && uniqueUnits[0] !== uniqueUnits[1]) {
          return {
            kind: 'unit',
            amount,
            from: uniqueUnits[0],
            to: uniqueUnits[1]
          };
        }
      }

      const mathResult = evaluateMathExpression(trimmed);
      if (mathResult !== null) {
        return { kind: 'math', result: mathResult };
      }

      return { kind: 'none' };
    }

    async function fetchRate(from, to) {
      const key = `${from}_${to}`;
      const inverseKey = `${to}_${from}`;
      const now = Date.now();
      const shortTtl = 1000 * 60 * 60;

      if (from === to) {
        return 1;
      }

      const cached = fxCache.get(key);
      if (cached && now - cached.time < shortTtl) {
        return cached.rate;
      }

      const inverse = fxCache.get(inverseKey);
      if (inverse && now - inverse.time < shortTtl && typeof inverse.rate === 'number' && inverse.rate !== 0) {
        const derived = 1 / inverse.rate;
        fxCache.set(key, { rate: derived, time: now });
        return derived;
      }

      const baseCached = fxBaseCache.get(from);
      if (baseCached && now < baseCached.expiresAt && baseCached.rates && typeof baseCached.rates[to] === 'number') {
        const rate = baseCached.rates[to];
        fxCache.set(key, { rate, time: now });
        if (rate !== 0) {
          fxCache.set(inverseKey, { rate: 1 / rate, time: now });
        }
        return rate;
      }

      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 1200);

      try {
        const response = await fetch(
          'https://open.er-api.com/v6/latest/' + encodeURIComponent(from),
          {
            method: 'GET',
            mode: 'cors',
            credentials: 'omit',
            signal: controller.signal,
            cache: 'force-cache'
          }
        );

        if (!response.ok) {
          throw new Error('Conversion request failed');
        }

        const data = await response.json();
        if (!data || data.result !== 'success' || !data.rates) {
          throw new Error('Conversion request failed');
        }

        const nextUpdateMs = typeof data.time_next_update_unix === 'number'
          ? data.time_next_update_unix * 1000
          : now + 1000 * 60 * 60 * 24;

        fxBaseCache.set(from, {
          rates: data.rates,
          expiresAt: nextUpdateMs
        });

        const rate = typeof data.rates[to] === 'number' ? data.rates[to] : null;
        if (typeof rate === 'number') {
          fxCache.set(key, { rate, time: now });
          if (rate !== 0) {
            fxCache.set(inverseKey, { rate: 1 / rate, time: now });
          }
        }

        return rate;
      } finally {
        clearTimeout(timeout);
      }
    }

    async function updateQuickResult(query) {
      const token = ++quickResultToken;
      const detected = detectQuickResultQuery(query);

      if (detected.kind === 'none') {
        hideQuickResult();
        return detected;
      }

      if (detected.kind === 'math') {
        const text = formatResultNumber(detected.result);
        showQuickResult('Calculator', text, { copyText: text });
        return detected;
      }

      if (detected.kind === 'currency' && Number.isFinite(detected.amount)) {
        showQuickResult('Converter', 'Loading…');
        try {
          const rate = await fetchRate(detected.from, detected.to);
          if (token !== quickResultToken) return detected;
          if (typeof rate === 'number') {
            const converted = detected.amount * rate;
            const text = formatResultNumber(detected.amount) + ' ' + detected.from + ' = ' + formatResultNumber(converted) + ' ' + detected.to;
            showQuickResult('Converter', text, { copyText: text });
            return detected;
          }
        } catch (error) {
          if (token === quickResultToken) showQuickResult('Converter', 'Could not load conversion');
        }
      }

      if (detected.kind === 'unit' && Number.isFinite(detected.amount)) {
        const converted = convertUnitValue(detected.amount, detected.from, detected.to);
        if (token !== quickResultToken) return detected;
        if (typeof converted === 'number' && Number.isFinite(converted)) {
          const text = formatUnitResult(detected.amount, detected.from) + ' = ' + formatUnitResult(converted, detected.to);
          showQuickResult('Unit Converter', text, { copyText: text });
          return detected;
        }
      }

      if (detected.kind === 'timezone' && detected.location) {
        showQuickResult('Time zone', 'Loading…');
        try {
          const place = await fetchTimezoneLocation(detected.location);
          if (token !== quickResultToken) return detected;
          const formatted = formatTimezoneQuickResult(place);
          if (formatted) {
            showQuickResult(formatted.label || 'Time zone', formatted.value, { copyText: formatted.value });
            return detected;
          }
          showQuickResult('Time zone', 'No location found');
          return detected;
        } catch (error) {
          if (token === quickResultToken) showQuickResult('Time zone', 'Could not load time');
        }
      }

      return detected;
    }

    function jsonpRequest(url) {
      return new Promise((resolve, reject) => {
        const callbackName = `suggestCallback_${Date.now()}_${Math.floor(Math.random() * 10000)}`;
        const script = document.createElement('script');
        const timeout = setTimeout(() => {
          cleanup();
          reject(new Error('Suggestion request timed out'));
        }, 2500);

        function cleanup() {
          clearTimeout(timeout);
          delete window[callbackName];
          script.remove();
        }

        window[callbackName] = (data) => {
          cleanup();
          resolve(data);
        };

        script.onerror = () => {
          cleanup();
          reject(new Error('Suggestion request failed'));
        };

        script.src = `${url}&callback=${callbackName}`;
        document.body.appendChild(script);
      });
    }

    async function fetchJson(url) {
      const response = await fetch(url, {
        method: 'GET',
        mode: 'cors',
        credentials: 'omit'

      if (!response.ok) {
        throw new Error('Suggestion request failed');
      }

      return response.json();
    }

    async function fetchSuggestions(query) {
      const requestToken = ++suggestionRequestToken;

      if (currentMode !== 'search') {
        hideSuggestions();
        return;
      }

      const selectedEngine = searchEngines[currentEngine] || searchEngines.google;

      const canRender = () =>
        requestToken === suggestionRequestToken &&
        currentMode === 'search' &&
        input.value.trim().toLowerCase() === query.toLowerCase() &&
        query.length > 0;
      const queryLower = query.toLowerCase();

      try {
        if (selectedEngine.suggest) {
          const data = await selectedEngine.suggest(queryLower);
          const liveSuggestions = selectedEngine.parseSuggestions ? selectedEngine.parseSuggestions(data) : [];

          if (liveSuggestions.length && canRender()) {
            renderSuggestions(liveSuggestions);
            return;
          }
        }
      } catch (error) {
      }

      try {
        const googleData = await searchEngines.google.suggest(queryLower);
        const googleSuggestions = searchEngines.google.parseSuggestions(googleData);

        if (googleSuggestions.length && canRender()) {
          renderSuggestions(googleSuggestions);
          return;
        }
      } catch (error) {
      }

      if (!canRender()) {
        return;
      }

      const filtered = fallbackSuggestions.filter((item) =>
        item.toLowerCase().includes(query.toLowerCase())
      );
      renderSuggestions(filtered);
    }

    function routeTypingToSearch(event) {
      if (event.defaultPrevented || event.ctrlKey || event.metaKey || event.altKey) {
        return;
      }

      const target = event.target;
      const isEditable =
        target instanceof HTMLElement &&
        (
          target === input ||
          target.tagName === 'TEXTAREA' ||
          (target.tagName === 'INPUT' && target !== engineTrigger) ||
          target.isContentEditable
        );

      if (isEditable) {
        return;
      }

      const isPrintable = event.key.length === 1;
      const isBackspace = event.key === 'Backspace';

      if (!isPrintable && !isBackspace) {
        return;
      }

      event.preventDefault();
      focusSearchInput(false);

      if (isPrintable) {
        const start = input.selectionStart ?? input.value.length;
        const end = input.selectionEnd ?? input.value.length;
        input.setRangeText(event.key, start, end, 'end');
      } else if (isBackspace) {
        const start = input.selectionStart ?? input.value.length;
        const end = input.selectionEnd ?? input.value.length;
        if (start !== end) {
          input.setRangeText('', start, end, 'end');
        } else if (start > 0) {
          input.setRangeText('', start - 1, start, 'end');
        }
      }

      input.dispatchEvent(new Event('input', { bubbles: true }));
    }

    function applyFirstWorkingImage(img, candidates) {
      let index = 0;

      const tryNext = () => {
        if (index >= candidates.length) {
          img.src = candidates[candidates.length - 1];
          img.classList.add('is-ready');
          return;
        }

        const src = candidates[index];
        index += 1;

        const probe = new Image();
        probe.onload = () => {
          img.src = src;
          img.classList.add('is-ready');
        };
        probe.onerror = tryNext;
        probe.src = src;
      };

      img.removeAttribute('src');
      img.classList.remove('is-ready');
      tryNext();
    }

    function createAudioPool(src, volume = 0.10, size = 6) {
      return Array.from({ length: size }, () => {
        const audio = new Audio(src);
        audio.preload = 'auto';
        audio.volume = volume;
        return audio;
      });
    }

    function playFromPool(pool, state) {
      const audio = pool[state.index];
      state.index = (state.index + 1) % pool.length;
      try {
        audio.pause();
        audio.currentTime = 0;
      } catch (error) {
        // noop
      }
      audio.play().catch(() => {});
    }

    ].map((line) => {

      return { ...line, audio };
    });

    function shuffleArray(items) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function getNextPostMetroTriggerPress() {
      return 5 + Math.floor(Math.random() * 6);
    }

    function buildPostMetroDispatchLines() {
      const extras = shuffleArray([
        { src: './keepmoving.wav' },
        { src: './moveit.wav' },
        { src: './freeman.wav' },
        { src: './firstwarningmove.wav', key: 'warning1' },
        { src: './thisisyoursecondwarning.wav', key: 'warning2' }
      ]);

      const warning1Index = extras.findIndex((line) => line.key === 'warning1');
      const warning2Index = extras.findIndex((line) => line.key === 'warning2');

      if (warning1Index !== -1 && warning2Index !== -1 && warning1Index > warning2Index) {
        [extras[warning1Index], extras[warning2Index]] = [extras[warning2Index], extras[warning1Index]];
      }

      return extras.map((line) => {
        const audio = new Audio(line.src);
        audio.preload = 'auto';
        audio.volume = 0.18;
        return { ...line, audio };
      });
    }

    const crowbarState = {
      enabled: false,
      raf: 0,
      mouseX: window.innerWidth * 0.5,
      mouseY: window.innerHeight * 0.5,
      vx: 0,
      vy: 0,
      angle: 0,
      swing: 0,
      swingVelocity: 0,
      hitPunch: 0,
      hitScale: 0,
      spawn: 0,
      width: 72,
      height: 170,
      hotspotX: 8,
      hotspotY: 24,
      prevMouseX: window.innerWidth * 0.5,
      prevMouseY: window.innerHeight * 0.5
    };

    let metroLineIndex = 0;
    let postMetroDispatchLines = buildPostMetroDispatchLines();
    let postMetroLineIndex = 0;
    let postMetroPressCount = 0;
    let nextPostMetroTriggerPress = getNextPostMetroTriggerPress();
    let activeMetroAudio = null;
    let metroBusy = false;
    let metroCooldownUntil = 0;
    let exhaustedCrowbarLines = false;
    let hlDropTimer = 0;
    let hlShiftTimer = 0;
    let hlCanTimer = 0;
    let hlLambdaRaf = 0;
    let hlCanRaf = 0;

    function syncCrowbarBounds() {
      const mobile = window.innerWidth <= 700;
      crowbarState.width = mobile ? 64 : 72;
      crowbarState.height = mobile ? 151 : 170;
      crowbarState.hotspotX = Math.round(crowbarState.width * 0.115);
      crowbarState.hotspotY = Math.round(crowbarState.height * 0.14);
      crowbarCursor.style.width = `${crowbarState.width}px`;
      crowbarCursor.style.height = `${crowbarState.height}px`;
    }

    syncCrowbarBounds();

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function cleanupMetroAudio(audio) {
      if (!audio) return;
      audio.pause();
      audio.currentTime = 0;
    }

    function markHlRefDrop() {
      hlRef.classList.remove('is-dropping');
      void hlRef.offsetWidth;
      hlRef.classList.add('is-dropping');
      clearTimeout(hlDropTimer);
      hlDropTimer = window.setTimeout(() => {
        hlRef.classList.remove('is-dropping');
      }, 220);
    }

    function getCrowbarHotspotOffset(angleDeg) {
      const rad = angleDeg * Math.PI / 180;
      const localX = crowbarState.hotspotX - (crowbarState.width * 0.5);
      const localY = crowbarState.hotspotY - (crowbarState.height * 0.5);
      return {
        x: (localX * Math.cos(rad)) - (localY * Math.sin(rad)),
        y: (localX * Math.sin(rad)) + (localY * Math.cos(rad))
      };
    }

    function getCrowbarTargetCenter(renderAngleDeg) {
      const offset = getCrowbarHotspotOffset(renderAngleDeg);
      return {
        x: crowbarState.mouseX - offset.x,
        y: crowbarState.mouseY - offset.y
      };
    }

    function smoothOutCubic(t) {
      const inv = 1 - t;
      return 1 - (inv * inv * inv);
    }

    function smoothInOutCubic(t) {
      return t < 0.5
        ? 4 * t * t * t
        : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function quadraticPoint(start, control, end, t) {
      const inv = 1 - t;
      return (inv * inv * start) + (2 * inv * t * control) + (t * t * end);
    }

    function spinLambdaSmooth() {
      if (hlLambdaRaf) {
        cancelAnimationFrame(hlLambdaRaf);
        hlLambdaRaf = 0;
      }

      const duration = 420;
      const started = performance.now();

      const step = (now) => {
        const t = Math.min(1, (now - started) / duration);
        const snap = Math.sin(Math.PI * t);
        const settle = smoothOutCubic(t);
        const rise = Math.sin(Math.PI * Math.min(1, t * 1.1));
        const squashX = 1 + (0.14 * snap);
        const squashY = 1 - (0.10 * snap);
        const lift = -2.6 * rise;
        const skew = 5.5 * (1 - settle) * snap;
        const blur = 0.22 + (0.95 * snap);
        const glowA = 0.24 + (0.34 * snap);
        const glowB = 0.06 + (0.16 * snap);

        lambdaEl.style.transform = `translate3d(0, ${lift.toFixed(2)}px, 0) scale(${squashX.toFixed(3)}, ${squashY.toFixed(3)}) skewX(${skew.toFixed(2)}deg)`;
        lambdaEl.style.filter = `blur(${blur.toFixed(2)}px)`;
        lambdaEl.style.textShadow = `0 0 ${(10 + snap * 12).toFixed(1)}px rgba(var(--accent-rgb), ${glowA.toFixed(3)}), 0 0 ${(18 + snap * 18).toFixed(1)}px rgba(var(--accent-rgb), ${glowB.toFixed(3)})`;

        if (t < 1) {
          hlLambdaRaf = requestAnimationFrame(step);
        } else {
          lambdaEl.style.transform = '';
          lambdaEl.style.filter = '';
          lambdaEl.style.textShadow = '';
          hlLambdaRaf = 0;
        }
      };

      hlLambdaRaf = requestAnimationFrame(step);
    }

    function triggerCanThrow() {
      if (hlCanRaf) {
        cancelAnimationFrame(hlCanRaf);
        hlCanRaf = 0;
      }

      hlCan.classList.add('throwing');
      clearTimeout(hlCanTimer);

      const duration = 780;
      const started = performance.now();

      const baseMainBlur = 'drop-shadow(0 7px 16px rgba(0, 0, 0, 0.22))';
      const baseTrailBlur = 'blur(1.15px)';

      const render = (tRaw) => {
        const t = Math.min(1, Math.max(0, tRaw));
        const motionT = smoothInOutCubic(t);
        const trailT = Math.max(0, motionT - 0.085);

        const x = quadraticPoint(-6, 46, 104, motionT);
        const y = quadraticPoint(18, -58, 14, motionT);
        const rotate = -18 + (406 * motionT);
        const scale = 0.82 + (0.155 * Math.sin(Math.PI * motionT));
        const fadeIn = Math.min(1, t / 0.16);
        const fadeOut = t > 0.82 ? 1 - ((t - 0.82) / 0.18) : 1;
        const opacity = Math.max(0, Math.min(1, Math.pow(fadeIn, 0.82) * Math.pow(fadeOut, 1.12)));

        const trailX = quadraticPoint(-11, 28, 78, trailT);
        const trailY = quadraticPoint(20, -42, -1, trailT);
        const trailRotate = -18 + (332 * trailT);
        const trailScale = 0.81 + (0.12 * Math.sin(Math.PI * trailT));
        const trailFade = t > 0.80 ? 1 - ((t - 0.80) / 0.20) : 1;
        const trailOpacity = 0.16 * Math.pow(Math.max(0, trailFade), 1.08) * Math.sin(Math.PI * Math.min(1, trailT + 0.12));

        const mainBlur = 0.22 + (1.05 * Math.sin(Math.PI * motionT));
        const trailBlur = 1.0 + (0.85 * Math.sin(Math.PI * trailT));

        hlCanImg.style.opacity = opacity.toFixed(3);
        hlCanImg.style.transform = `translate3d(${x.toFixed(2)}px, ${y.toFixed(2)}px, 0) rotate(${rotate.toFixed(2)}deg) scale(${scale.toFixed(3)})`;
        hlCanImg.style.filter = `blur(${mainBlur.toFixed(2)}px) ${baseMainBlur}`;

        hlCanTrailImg.style.opacity = Math.max(0, trailOpacity).toFixed(3);
        hlCanTrailImg.style.transform = `translate3d(${trailX.toFixed(2)}px, ${trailY.toFixed(2)}px, 0) rotate(${trailRotate.toFixed(2)}deg) scale(${trailScale.toFixed(3)})`;
        hlCanTrailImg.style.filter = `${baseTrailBlur} blur(${trailBlur.toFixed(2)}px)`;
      };

      const step = (now) => {
        const t = Math.min(1, (now - started) / duration);
        render(t);

        if (t < 1) {
          hlCanRaf = requestAnimationFrame(step);
        } else {
          hlCan.classList.remove('throwing');
          hlCanImg.style.opacity = '0';
          hlCanImg.style.transform = 'translate3d(-4px, 16px, 0) rotate(-16deg) scale(0.82)';
          hlCanImg.style.filter = '';
          hlCanTrailImg.style.opacity = '0';
          hlCanTrailImg.style.transform = 'translate3d(-4px, 16px, 0) rotate(-16deg) scale(0.82)';
          hlCanTrailImg.style.filter = '';
          hlCanRaf = 0;
        }
      };

      render(0);
      hlCanRaf = requestAnimationFrame(step);

      hlCanTimer = window.setTimeout(() => {
        hlCan.classList.remove('throwing');
      }, duration + 40);
    }

    function resetCrowbarExperience() {
      cleanupMetroAudio(activeMetroAudio);
      activeMetroAudio = null;
      metroBusy = false;
      metroCooldownUntil = 0;
      metroLineIndex = 0;
      postMetroDispatchLines = buildPostMetroDispatchLines();
      postMetroLineIndex = 0;
      postMetroPressCount = 0;
      nextPostMetroTriggerPress = getNextPostMetroTriggerPress();
      exhaustedCrowbarLines = false;
      clearTimeout(hlDropTimer);
      clearTimeout(hlShiftTimer);
      clearTimeout(hlCanTimer);

      if (crowbarState.raf) {
        cancelAnimationFrame(crowbarState.raf);
        crowbarState.raf = 0;
      }
      if (hlLambdaRaf) {
        cancelAnimationFrame(hlLambdaRaf);
        hlLambdaRaf = 0;
      }
      if (hlCanRaf) {
        cancelAnimationFrame(hlCanRaf);
        hlCanRaf = 0;
      }

      crowbarState.enabled = false;
      crowbarState.vx = 0;
      crowbarState.vy = 0;
      crowbarState.angle = 0;
      crowbarState.swing = 0;
      crowbarState.swingVelocity = 0;
      crowbarState.hitPunch = 0;
      crowbarState.hitScale = 0;
      crowbarState.spawn = 0;
      crowbarState.mouseX = window.innerWidth * 0.5;
      crowbarState.mouseY = window.innerHeight * 0.5;
      crowbarState.prevMouseX = crowbarState.mouseX;
      crowbarState.prevMouseY = crowbarState.mouseY;

      document.body.classList.remove('crowbar-mode');
      crowbarCursor.classList.remove('active');
      crowbarCursor.style.transform = 'translate3d(-999px, -999px, 0)';
      crowbarCursorImg.style.filter = 'drop-shadow(0 0 1px rgba(255,255,255,0.12)) drop-shadow(0 4px 10px rgba(0,0,0,0.30))';
      hlCan.classList.remove('throwing');
      hlCanImg.style.opacity = '0';
      hlCanImg.style.transform = 'translate3d(-4px, 16px, 0) rotate(-16deg) scale(0.82)';
      hlCanImg.style.filter = '';
      hlCanTrailImg.style.opacity = '0';
      hlCanTrailImg.style.transform = 'translate3d(-4px, 16px, 0) rotate(-16deg) scale(0.82)';
      hlCanTrailImg.style.filter = '';
      lambdaEl.style.transform = '';
      lambdaEl.style.filter = '';
      lambdaEl.style.textShadow = '';
      hlRef.classList.remove('is-armed', 'is-speaking', 'is-exhausted', 'is-dropping', 'is-mode-shifting');
    }

    function activateCrowbarMode() {
      if (crowbarState.enabled) return;
      crowbarState.enabled = true;
      crowbarState.spawn = 0;
      document.body.classList.add('crowbar-mode');
      crowbarCursor.classList.add('active');
      hlRef.classList.add('is-armed');
      hlRef.classList.remove('is-mode-shifting');
      void hlRef.offsetWidth;
      hlRef.classList.add('is-mode-shifting');
      spinLambdaSmooth();
      clearTimeout(hlShiftTimer);
      hlShiftTimer = window.setTimeout(() => {
        hlRef.classList.remove('is-mode-shifting');
      }, 480);

      crowbarState.prevMouseX = crowbarState.mouseX;
      crowbarState.prevMouseY = crowbarState.mouseY;

      if (!crowbarState.raf) {
        crowbarState.raf = requestAnimationFrame(animateCrowbarCursor);
      }
    }

    function playCrowbarHitSound() {
      playFromPool(crowbarHitAudioPool, crowbarHitAudioState);
    }

    function playUIClickSound() {
      if (!crowbarState.enabled) return;
      playFromPool(uiClickAudioPool, uiClickAudioState);
    }

    function playHlRefBeepSound() {
      playFromPool(hlRefBeepAudioPool, hlRefBeepAudioState);
    }

    function triggerCrowbarStrike(soundType = 'crowbar') {
      crowbarState.swingVelocity -= 2.55;
      crowbarState.hitPunch = 1.18;
      crowbarState.hitScale = 1;
      if (soundType === 'beep') {
        playHlRefBeepSound();
      } else {
        playCrowbarHitSound();
      }
    }

    function animateCrowbarCursor() {
      crowbarState.hitPunch *= 0.76;
      crowbarState.hitScale *= 0.82;
      crowbarState.spawn += (1 - crowbarState.spawn) * 0.16;

      const rawDX = crowbarState.mouseX - crowbarState.prevMouseX;
      const rawDY = crowbarState.mouseY - crowbarState.prevMouseY;
      crowbarState.prevMouseX = crowbarState.mouseX;
      crowbarState.prevMouseY = crowbarState.mouseY;

      crowbarState.vx = (crowbarState.vx * 0.62) + (rawDX * 0.38);
      crowbarState.vy = (crowbarState.vy * 0.62) + (rawDY * 0.38);

      const motionAngle = clamp((crowbarState.vx * 1.06) + (crowbarState.vy * 0.12), -16, 16);

      crowbarState.swingVelocity += (0 - crowbarState.swing) * 0.14;
      crowbarState.swingVelocity *= 0.82;
      crowbarState.swing += crowbarState.swingVelocity;
      crowbarState.swing *= 0.93;

      crowbarState.angle += ((motionAngle + crowbarState.swing) - crowbarState.angle) * 0.28;

      const easedSpawn = 1 - Math.pow(1 - crowbarState.spawn, 3);
      const spawnScale = 0.80 + (0.20 * easedSpawn);
      const spawnAngle = -14 * (1 - easedSpawn);
      const renderAngle = crowbarState.angle + spawnAngle;

      const target = getCrowbarTargetCenter(renderAngle);
      const recoilX = -crowbarState.hitPunch * 5.0;
      const recoilY = crowbarState.hitPunch * 3.5;
      const recoilScale = 1 - (crowbarState.hitScale * 0.03);
      const tx = target.x - (crowbarState.width * 0.5) + recoilX;
      const ty = target.y - (crowbarState.height * 0.5) + recoilY;
      const speed = Math.hypot(crowbarState.vx, crowbarState.vy);
      const motionBlur = Math.min(1.1, speed * 0.05);
      const motionBright = 1 + Math.min(0.08, speed * 0.004);

      crowbarCursorImg.style.filter = `blur(${motionBlur.toFixed(2)}px) brightness(${motionBright.toFixed(3)}) drop-shadow(0 0 1px rgba(255,255,255,0.12)) drop-shadow(0 4px 10px rgba(0,0,0,0.30))`;
      crowbarCursor.style.transform = `translate3d(${tx}px, ${ty}px, 0) rotate(${renderAngle}deg) scale(${spawnScale * recoilScale})`;
      crowbarState.raf = requestAnimationFrame(animateCrowbarCursor);
    }

    function handleMetroLineTrigger() {
      const now = performance.now();
      if (metroBusy || now < metroCooldownUntil) {
        return;
      }

      const playLine = (line, onAfterEnd) => {
        metroBusy = true;
        activeMetroAudio = line.audio;
        hlRef.classList.add('is-speaking');

        const finalize = () => {
          if (!activeMetroAudio) return;
          activeMetroAudio.removeEventListener('ended', finalize);
          activeMetroAudio.removeEventListener('error', finalize);
          metroBusy = false;
          metroCooldownUntil = performance.now() + 1000;
          hlRef.classList.remove('is-speaking');
          activeMetroAudio = null;
          if (typeof onAfterEnd === 'function') {
            onAfterEnd();
          }
        };

        activeMetroAudio.currentTime = 0;
        activeMetroAudio.addEventListener('ended', finalize);
        activeMetroAudio.addEventListener('error', finalize);
        activeMetroAudio.play().catch(() => {
          finalize();
        });
      };

      if (metroLineIndex < metroDispatchLines.length) {
        const line = metroDispatchLines[metroLineIndex];
        const isAllRightYouCanGoLine = metroLineIndex === (metroDispatchLines.length - 1);
        if (isAllRightYouCanGoLine) {
          triggerCanThrow();
        }
        playLine(line, () => {
          metroLineIndex += 1;
          if (metroLineIndex >= metroDispatchLines.length && postMetroLineIndex >= postMetroDispatchLines.length) {
            exhaustedCrowbarLines = true;
            hlRef.classList.add('is-exhausted');
          } else {
            hlRef.classList.remove('is-exhausted');
          }
        });
        return;
      }

      if (postMetroLineIndex >= postMetroDispatchLines.length) {
        exhaustedCrowbarLines = true;
        hlRef.classList.add('is-exhausted');
        return;
      }

      postMetroPressCount += 1;
      if (postMetroPressCount < nextPostMetroTriggerPress) {
        return;
      }

      const line = postMetroDispatchLines[postMetroLineIndex];
      playLine(line, () => {
        postMetroLineIndex += 1;
        postMetroPressCount = 0;
        nextPostMetroTriggerPress = getNextPostMetroTriggerPress();

        if (postMetroLineIndex >= postMetroDispatchLines.length) {
          exhaustedCrowbarLines = true;
          hlRef.classList.add('is-exhausted');
        }
      });
    }

    hlRef.addEventListener('mousedown', (event) => {
      if (event.button !== 0) return;
      activateCrowbarMode();
      triggerCrowbarStrike('beep');
      markHlRefDrop();
    });

    hlRef.addEventListener('click', (event) => {
      event.preventDefault();
      activateCrowbarMode();
      handleMetroLineTrigger();
    });

    hlRef.addEventListener('keydown', (event) => {
      if (event.key !== 'Enter' && event.key !== ' ') return;
      event.preventDefault();
      activateCrowbarMode();
      triggerCrowbarStrike('beep');
      markHlRefDrop();
      handleMetroLineTrigger();
    });

    window.addEventListener('mousemove', (event) => {
      crowbarState.mouseX = event.clientX;
      crowbarState.mouseY = event.clientY;
    }, { passive: true });

    const uiCrowbarMuteSelectors = [
      '#modeToggleBtn',
      '#settingsTrigger',
      '#engineTrigger',
      '#aiTrigger',
      '#wallpaperSettingsItem',
      '#clockToggleItem',
      '#dateToggleItem',
      '#weatherToggleItem',
      '.suggestion-item',
      '.engine-option',
      '.ai-option',
      '.wallpaper-subitem',
      '#engineMenu',
      '#aiMenu',
      '#settingsMenu',
      '#wallpaperSubmenu'
    ].join(', ');

    document.addEventListener('mousedown', (event) => {
      if (!crowbarState.enabled || event.button !== 0) return;
      if (event.target && event.target.closest && event.target.closest('#hlRef')) return;
      if (event.target && event.target.closest && event.target.closest(uiCrowbarMuteSelectors)) return;
      triggerCrowbarStrike();
    });

    // Fade out crowbar when mouse leaves the page (e.g. tabs / URL bar)
    document.addEventListener('mouseleave', () => {
      if (!crowbarState.enabled) return;
      crowbarCursor.classList.remove('active');
    });

    document.addEventListener('mouseenter', () => {
      if (!crowbarState.enabled) return;
      crowbarCursor.classList.add('active');
    });

    // Fade out crowbar on right-click; restore on next mousemove
    document.addEventListener('contextmenu', () => {
      if (!crowbarState.enabled) return;
      crowbarCursor.classList.remove('active');
    });

    window.addEventListener('mousemove', () => {
      if (!crowbarState.enabled) return;
      if (!crowbarCursor.classList.contains('active')) {
        crowbarCursor.classList.add('active');
      }
    }, { passive: true });

    window.addEventListener('resize', () => {
      syncCrowbarBounds();
      if (!crowbarState.enabled) {
        crowbarState.prevMouseX = crowbarState.mouseX;
        crowbarState.prevMouseY = crowbarState.mouseY;
      }
    });

    window.addEventListener('blur', () => {
      cleanupMetroAudio(activeMetroAudio);
      activeMetroAudio = null;
      metroBusy = false;
      hlRef.classList.remove('is-speaking');
      metroCooldownUntil = performance.now() + 300;
    });

    window.addEventListener('pageshow', () => {
      resetCrowbarExperience();
    });

    resetCrowbarExperience();


    form.addEventListener('submit', (event) => {
      event.preventDefault();
      if (currentMode === 'chatgpt') {
        openSelectedAIWithPrompt(input.value);
      } else {
        performSearch(input.value);
      }
    });
  </script>


</body>
