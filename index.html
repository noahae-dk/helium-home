<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#05070a" />
  <title>Helium Start Page</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      overflow: hidden;
      background: #05070a;
      color-scheme: dark;
    }

    body {
      background-color: #05070a;
      background-image: url('tlou wallpaper 2 helium.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      position: relative;
      color: white;
      touch-action: manipulation;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.18), rgba(0, 0, 0, 0.06));
      pointer-events: none;
    }

    .overlay {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      padding: 24px;
    }

    .clock {
      font-size: 2.7rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-shadow: 0 4px 18px rgba(0, 0, 0, 0.45);
      user-select: none;
      line-height: 1;
      margin-bottom: 8px;
    }

    .date {
      font-size: 1.18rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-shadow: 0 4px 18px rgba(0, 0, 0, 0.45);
      user-select: none;
      color: rgba(255, 255, 255, 0.92);
    }

    .search-wrap {
      width: min(820px, calc(100vw - 48px));
      position: absolute;
      top: 42%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .search-wrap.has-result .suggestions {
      top: calc(100% + 96px);
    }

    .search-form {
      display: flex;
      align-items: center;
      position: relative;
      z-index: 30;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      background: rgba(10, 16, 24, 0.40);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 18px;
      box-shadow: 0 12px 34px rgba(0, 0, 0, 0.24);
      overflow: visible;
      transition:
        transform 0.34s cubic-bezier(.2, .8, .2, 1),
        box-shadow 0.34s cubic-bezier(.2, .8, .2, 1),
        background 0.34s cubic-bezier(.2, .8, .2, 1),
        border-color 0.34s cubic-bezier(.2, .8, .2, 1),
        filter 0.34s cubic-bezier(.2, .8, .2, 1);
    }

    .search-form::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background:
        linear-gradient(
          90deg,
          transparent 0%,
          transparent 16%,
          rgba(255,255,255,0.045) 30%,
          rgba(255,255,255,0.03) 42%,
          transparent 58%,
          transparent 78%,
          rgba(255,255,255,0.02) 100%
        ),
        radial-gradient(
          120% 100% at 38% 50%,
          rgba(255,255,255,0.045) 0%,
          transparent 42%
        );
      opacity: 0.72;
      pointer-events: none;
      transition: opacity 0.34s ease, transform 0.34s ease;
    }

    .search-form:hover {
      transform: translateY(-3px) scale(1.012);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.30);
      border-color: rgba(255, 255, 255, 0.22);
      background: rgba(12, 18, 28, 0.48);
      filter: saturate(1.05);
    }

    .search-form:hover::before {
      opacity: 0.95;
      transform: translateX(3px);
    }

    .search-form:focus-within {
      transform: translateY(-4px) scale(1.016);
      box-shadow: 0 20px 48px rgba(0, 0, 0, 0.34);
      border-color: rgba(255, 255, 255, 0.28);
      background: rgba(14, 20, 32, 0.54);
    }

    .search-form:focus-within::before {
      opacity: 0.88;
      transform: translateX(2px);
    }

    .search-form.mode-chatgpt {
      background: rgba(9, 22, 18, 0.56);
      border-color: rgba(104, 255, 191, 0.22);
      box-shadow:
        0 20px 48px rgba(0, 0, 0, 0.34),
        0 0 0 1px rgba(104, 255, 191, 0.07) inset,
        0 0 44px rgba(104, 255, 191, 0.06);
    }

    .search-form.mode-chatgpt::before {
      background:
        linear-gradient(
          90deg,
          transparent 0%,
          transparent 22%,
          rgba(104,255,191,0.05) 36%,
          rgba(104,255,191,0.035) 48%,
          transparent 64%,
          transparent 82%,
          rgba(104,255,191,0.025) 100%
        ),
        radial-gradient(
          120% 100% at 44% 50%,
          rgba(104,255,191,0.075) 0%,
          transparent 42%
        );
    }

    .search-form.mode-chatgpt:hover,
    .search-form.mode-chatgpt:focus-within {
      background: rgba(10, 24, 19, 0.62);
      border-color: rgba(104, 255, 191, 0.30);
      box-shadow:
        0 22px 52px rgba(0, 0, 0, 0.36),
        0 0 0 1px rgba(104, 255, 191, 0.10) inset,
        0 0 58px rgba(104, 255, 191, 0.10);
    }


    .mode-sparkles {
      position: absolute;
      inset: -22px;
      pointer-events: none;
      overflow: visible;
      z-index: 45;
    }

    .mode-sparkle {
      position: absolute;
      width: 10px;
      height: 10px;
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.4) rotate(0deg);
      animation: modeSparkleBurst 760ms cubic-bezier(.2, .8, .2, 1) forwards;
      filter: drop-shadow(0 0 10px rgba(var(--accent-rgb), 0.25));
    }

    .mode-sparkle::before,
    .mode-sparkle::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 2px;
      height: 10px;
      border-radius: 999px;
      background: rgba(var(--accent-text-rgb), 0.95);
      transform: translate(-50%, -50%);
      box-shadow: 0 0 10px rgba(var(--accent-rgb), 0.18);
    }

    .mode-sparkle::after {
      transform: translate(-50%, -50%) rotate(90deg);
    }

    .mode-sparkle.is-soft::before,
    .mode-sparkle.is-soft::after {
      height: 8px;
      background: rgba(255, 255, 255, 0.85);
    }

    @keyframes modeSparkleBurst {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.35) rotate(0deg);
      }
      18% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.05) rotate(28deg);
      }
      100% {
        opacity: 0;
        transform: translate(calc(-50% + var(--sparkle-x, 0px)), calc(-50% + var(--sparkle-y, 0px))) scale(0.72) rotate(70deg);
      }
    }

    .search-form.is-mode-switching {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 22px 52px rgba(0, 0, 0, 0.34);
      border-color: rgba(255, 255, 255, 0.24);
    }

    .search-form.mode-chatgpt.is-mode-switching {
      border-color: rgba(var(--accent-rgb), 0.30);
      box-shadow:
        0 22px 52px rgba(0, 0, 0, 0.36),
        0 0 0 1px rgba(var(--accent-rgb), 0.10) inset,
        0 0 34px rgba(var(--accent-rgb), 0.10);
    }

    .search-form.is-mode-switching::before {
      opacity: 0.98;
      transform: translateX(8px) scale(1.03, 1.015);
      filter: saturate(1.12);
    }

    .search-form.mode-chatgpt.is-mode-switching::before {
      opacity: 1;
      transform: translateX(10px) scale(1.035, 1.02);
      filter: saturate(1.16);
    }

    .search-form.is-pressed {
      transform: translateY(-2px) scale(1.008);
    }

    .search-form.is-pressed::before {
      opacity: 0.92;
      transform: translateX(6px) scale(1.01, 0.995);
    }

    .engine-picker {
      position: relative;
      flex-shrink: 0;
      padding-right: 10px;
      display: inline-flex;
      transition: opacity 0.24s ease, transform 0.30s cubic-bezier(.2, .8, .2, 1);
    }

    .search-form.mode-chatgpt .engine-picker {
      display: none;
      opacity: 0;
      transform: translateX(14px) scale(0.96);
      pointer-events: none;
    }

    .engine-trigger {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      height: 50px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      outline: none;
      background: rgba(255, 255, 255, 0.08);
      color: white;
      padding: 0 14px 0 12px;
      cursor: pointer;
      border-radius: 999px;
      transition:
        background 0.22s ease,
        border-color 0.22s ease,
        transform 0.22s ease,
        box-shadow 0.22s ease,
        opacity 0.22s ease;
      min-width: 132px;
      justify-content: center;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .engine-trigger:hover,
    .engine-trigger.active {
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.16);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    .engine-trigger:active { transform: scale(0.985); }

    .engine-icon {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      background: rgba(255, 255, 255, 0.08);
    }

    .engine-label {
      font-size: 0.95rem;
      line-height: 1;
      white-space: nowrap;
      color: rgba(255, 255, 255, 0.95);
    }

    .engine-caret {
      width: 8px;
      height: 8px;
      border-right: 1.5px solid rgba(255, 255, 255, 0.85);
      border-bottom: 1.5px solid rgba(255, 255, 255, 0.85);
      transform: rotate(45deg) translateY(-1px);
      margin-left: 2px;
      opacity: 0.9;
      flex-shrink: 0;
      transition: transform 0.18s ease;
    }

    .engine-trigger.active .engine-caret {
      transform: rotate(225deg) translateY(-1px);
    }

    .engine-menu {
      position: absolute;
      top: calc(100% + 12px);
      right: 10px;
      width: 220px;
      margin: 0;
      padding: 8px;
      list-style: none;
      border-radius: 16px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      background: rgba(10, 16, 24, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.32);
      display: none;
      z-index: 40;
    }

    .engine-menu.visible { display: block; }

    .engine-option {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      color: white;
      cursor: pointer;
      transition: background 0.16s ease, transform 0.16s ease;
    }

    .engine-option:hover,
    .engine-option.active {
      background: rgba(255, 255, 255, 0.1);
      transform: translateX(2px);
    }

    .engine-option .engine-icon {
      width: 20px;
      height: 20px;
    }

    .engine-option + .engine-option {
      margin-top: 6px;
    }

    .quick-result {
      position: absolute;
      top: calc(100% + 12px);
      left: 0;
      width: 100%;
      margin: 0;
      padding: 14px 18px;
      border-radius: 14px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      background: rgba(10, 16, 24, 0.58);
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: 0 16px 38px rgba(0, 0, 0, 0.28);
      z-index: 22;
      opacity: 0;
      transform: translateY(8px) scale(0.985);
      pointer-events: none;
      transition:
        opacity 0.22s ease,
        transform 0.26s cubic-bezier(.2, .8, .2, 1);
    }

    .quick-result.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .quick-result-value {
      font-size: 1.15rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.96);
      word-break: break-word;
    }

    .mode-toast {
      position: absolute;
      left: 50%;
      top: calc(100% + 14px);
      transform: translate(-50%, 8px) scale(0.96);
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(10, 16, 24, 0.64);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.26);
      font-size: 0.84rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.88);
      opacity: 0;
      pointer-events: none;
      transition:
        opacity 0.28s ease,
        transform 0.34s cubic-bezier(.2, .8, .2, 1),
        border-color 0.28s ease,
        background 0.28s ease,
        box-shadow 0.28s ease;
      z-index: 50;
      white-space: nowrap;
    }

    .mode-toast.visible {
      opacity: 1;
      transform: translate(-50%, 0) scale(1);
    }

    .mode-toast.chatgpt {
      background: rgba(8, 22, 18, 0.72);
      border-color: rgba(104, 255, 191, 0.24);
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.28), 0 0 24px rgba(104, 255, 191, 0.08);
      color: rgba(194, 255, 227, 0.94);
    }

    .suggestions {
      position: absolute;
      top: calc(100% + 12px);
      left: 0;
      width: 100%;
      margin: 0;
      padding: 8px;
      list-style: none;
      border-radius: 14px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      background: rgba(10, 16, 24, 0.52);
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: 0 16px 38px rgba(0, 0, 0, 0.28);
      max-height: 280px;
      overflow-y: auto;
      z-index: 20;
      opacity: 0;
      transform: translateY(8px) scale(0.985);
      pointer-events: none;
      transition:
        opacity 0.22s ease,
        transform 0.26s cubic-bezier(.2, .8, .2, 1);
    }

    .suggestions.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .suggestion-item {
      padding: 12px 14px;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      font-size: 1.03rem;
      transition: background 0.16s ease, transform 0.16s ease;
    }

    .suggestion-item:hover,
    .suggestion-item.active {
      background: rgba(255, 255, 255, 0.12);
      transform: translateX(2px);
    }

    .search-input {
      position: relative;
      z-index: 1;
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      color: white;
      font-size: 1.2rem;
      padding: 20px 24px;
      min-width: 0;
      transition: color 0.24s ease, padding 0.30s cubic-bezier(.2, .8, .2, 1), font-size 0.24s ease;
    }

    .search-form.mode-chatgpt .search-input {
      padding-left: 24px;
      font-size: 1.18rem;
      color: rgba(240, 255, 248, 0.98);
    }

    .search-input::placeholder {
      color: rgba(255, 255, 255, 0.72);
      transition: opacity 0.2s ease, color 0.24s ease;
    }

    .search-form.mode-chatgpt .search-input::placeholder {
      color: rgba(194, 255, 227, 0.82);
    }
  
    .ai-picker {
      position: relative;
      flex-shrink: 0;
      padding-right: 10px;
      display: none;
      opacity: 0;
      transform: translateX(14px) scale(0.96);
      pointer-events: none;
      transition: opacity 0.24s ease, transform 0.30s cubic-bezier(.2, .8, .2, 1);
    }

    .search-form.mode-chatgpt .ai-picker {
      display: inline-flex;
      opacity: 1;
      transform: translateX(0) scale(1);
      pointer-events: auto;
    }

    .ai-trigger {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      height: 50px;
      border: 1px solid rgba(104, 255, 191, 0.16);
      outline: none;
      background: rgba(104, 255, 191, 0.08);
      color: white;
      padding: 0 14px 0 12px;
      cursor: pointer;
      border-radius: 999px;
      transition:
        background 0.22s ease,
        border-color 0.22s ease,
        transform 0.22s ease,
        box-shadow 0.22s ease,
        opacity 0.22s ease;
      min-width: 138px;
      justify-content: center;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .ai-trigger:hover,
    .ai-trigger.active {
      background: rgba(104, 255, 191, 0.14);
      border-color: rgba(104, 255, 191, 0.24);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    .ai-trigger:active {
      transform: scale(0.985);
    }

    .ai-icon {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      background: rgba(255, 255, 255, 0.08);
    }

    .ai-label {
      font-size: 0.95rem;
      line-height: 1;
      white-space: nowrap;
      color: rgba(255, 255, 255, 0.95);
    }

    .ai-caret {
      width: 8px;
      height: 8px;
      border-right: 1.5px solid rgba(255, 255, 255, 0.85);
      border-bottom: 1.5px solid rgba(255, 255, 255, 0.85);
      transform: rotate(45deg) translateY(-1px);
      margin-left: 2px;
      opacity: 0.9;
      flex-shrink: 0;
      transition: transform 0.18s ease;
    }

    .ai-trigger.active .ai-caret {
      transform: rotate(225deg) translateY(-1px);
    }

    .ai-menu {
      position: absolute;
      top: calc(100% + 12px);
      right: 10px;
      width: 220px;
      margin: 0;
      padding: 8px;
      list-style: none;
      border-radius: 16px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      background: rgba(10, 16, 24, 0.82);
      border: 1px solid rgba(104, 255, 191, 0.14);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.32);
      display: none;
      z-index: 40;
    }

    .ai-menu.visible {
      display: block;
    }

    .ai-option {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      color: white;
      cursor: pointer;
      transition: background 0.16s ease, transform 0.16s ease;
    }

    .ai-option:hover,
    .ai-option.active {
      background: rgba(104, 255, 191, 0.10);
      transform: translateX(2px);
    }

    .ai-option .ai-icon {
      width: 20px;
      height: 20px;
    }

    .ai-option + .ai-option {
      margin-top: 6px;
    }

  
    .copy-toast {
      position: absolute;
      left: 50%;
      top: calc(100% + 58px);
      transform: translate(-50%, 8px) scale(0.96);
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(10, 16, 24, 0.74);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.26);
      font-size: 0.84rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.92);
      opacity: 0;
      pointer-events: none;
      transition:
        opacity 0.24s ease,
        transform 0.28s cubic-bezier(.2, .8, .2, 1);
      z-index: 55;
      white-space: nowrap;
    }

    .copy-toast.visible {
      opacity: 1;
      transform: translate(-50%, 0) scale(1);
    }

  
    @keyframes pickerFadeSlideIn {
      0% {
        opacity: 0;
        transform: translateX(10px) scale(0.97);
      }
      100% {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
    }
      50% {
        transform: translate(-7px, 3px) scale(1.06);
      }
      100% {
        transform: translate(0px, 0px) scale(1);
      }
    }

    .search-form:not(.mode-chatgpt) .engine-trigger {
      animation: pickerFadeSlideIn 0.26s cubic-bezier(.2, .8, .2, 1);
      transform-origin: right center;
    }

    .search-form.mode-chatgpt .ai-trigger {
      animation: pickerFadeSlideIn 0.26s cubic-bezier(.2, .8, .2, 1);
      transform-origin: right center;
    }

    .search-form.switching-to-search .engine-trigger {
      animation: pickerFadeSlideIn 0.28s cubic-bezier(.2, .8, .2, 1);
      transform-origin: right center;
    }

    .search-form.switching-to-ai .ai-trigger {
      animation: pickerFadeSlideIn 0.28s cubic-bezier(.2, .8, .2, 1);
      transform-origin: right center;
    }


    .mode-toggle {
      position: fixed;
      right: 76px;
      bottom: 22px;
      z-index: 121;
    }

    .mode-toggle-btn {
      width: 50px;
      height: 50px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 999px;
      background: rgba(10, 16, 24, 0.52);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.24);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: white;
      cursor: pointer;
      transition:
        transform 0.24s ease,
        background 0.24s ease,
        border-color 0.24s ease,
        box-shadow 0.24s ease,
        color 0.24s ease;
    }

    .mode-toggle-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.30);
    }

    .mode-toggle-btn.is-ai {
      background: rgba(10, 16, 24, 0.52);
      border-color: rgba(255, 255, 255, 0.16);
      color: rgba(255,255,255,0.92);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.24);
    }

    .mode-toggle-btn.is-search {
      background: rgba(var(--accent-rgb), 0.30);
      border-color: rgba(var(--accent-rgb), 0.52);
      color: rgba(var(--accent-text-rgb), 0.99);
      box-shadow:
        0 16px 34px rgba(0, 0, 0, 0.30),
        0 0 34px rgba(var(--accent-rgb), 0.18),

      const now = Date.now();
      if (!modeSparkles || now < nextSparkleAt) return;
      nextSparkleAt = now + 820;
      modeSparkles.innerHTML = '';

      const points = [
        { left: '10%', top: '26%', x: -14, y: -8, soft: false },
        { left: '18%', top: '74%', x: -10, y: 8, soft: true },
        { left: '32%', top: '14%', x: -6, y: -10, soft: true },

        { left: '90%', top: '28%', x: 14, y: -8, soft: false },
        { left: '50%', top: '4%', x: 0, y: -12, soft: false },
        { left: '50%', top: '96%', x: 0, y: 12, soft: true }
      ];

      for (const point of points) {
        const sparkle = document.createElement('span');
        sparkle.className = 'mode-sparkle' + (point.soft ? ' is-soft' : '');
        sparkle.style.left = point.left;
        sparkle.style.top = point.top;
        sparkle.style.setProperty('--sparkle-x', point.x + 'px');
        sparkle.style.setProperty('--sparkle-y', point.y + 'px');
        sparkle.style.animationDelay = (Math.random() * 70) + 'ms';
        modeSparkles.appendChild(sparkle);
      }

      setTimeout(() => {
        modeSparkles.innerHTML = '';

    function looksLikeDirectUrl(value) {
      const query = String(value || '').trim();
      if (!query || /\s/.test(query) || query.includes('@')) {
        return false;
      }

      return /^(?:(?:https?):\/\/)?(?:localhost|\d{1,3}(?:\.\d{1,3}){3}|(?:[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?\.)+[a-z]{2,24})(?::\d{2,5})?(?:[/?#][^\s]*)?$/i.test(query);
    }

    function normalizeDirectUrl(value) {
      const query = String(value || '').trim();
      if (/^https?:\/\//i.test(query)) {
        return query;
      }
      return 'https://' + query;
    }

    function performSearch(query) {
      const cleanQuery = String(query || '').trim();
      if (!cleanQuery) return;

      hideSuggestions();
      hideQuickResult();

      if (looksLikeDirectUrl(cleanQuery)) {

        return;
      }

      const selectedEngine = searchEngines[currentEngine] || searchEngines.google;
      const url = `${selectedEngine.searchUrl}${encodeURIComponent(cleanQuery)}`;
      window.location.href = url;
    }

    async function copyTextToClipboard(text) {
      const value = String(text || '');
      if (!value) return false;

      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(value);
          return true;
        }
      } catch (error) {
      }

      try {
        const helper = document.createElement('textarea');
        helper.value = value;
        helper.setAttribute('readonly', '');
        helper.style.position = 'fixed';
        helper.style.opacity = '0';
        helper.style.pointerEvents = 'none';
        helper.style.left = '-9999px';
        document.body.appendChild(helper);
        helper.focus();
        helper.select();
        const success = document.execCommand('copy');
        helper.remove();
        return !!success;
      } catch (error) {
        return false;
      }
    }

    function evaluateMathExpression(query) {
      const raw = normalizeMathQuery(query);
      if (!raw) return null;

      const letterCheck = raw
        .replace(/\b(?:sqrt|cbrt|abs|round|floor|ceil|sin|cos|tan|asin|acos|atan|ln|log|exp|pi|e|math)\b/gi, '')
        .replace(/\s+/g, '');

      if (/[a-df-z]/i.test(letterCheck)) {
        return null;
      }

      if (!/[0-9]|pi|e/i.test(raw)) {
        return null;
      }

      if (/^e$/i.test(raw.trim())) {
        return null;
      }

      let expression = raw
        .replace(/,/g, '.')
        .replace(/\^/g, '**')
        .replace(/\bpi\b/gi, 'Math.PI')
        .replace(/\be\b/gi, 'Math.E')
        .replace(/\bsqrt\s*\(/gi, 'Math.sqrt(')
        .replace(/\bcbrt\s*\(/gi, 'Math.cbrt(')
        .replace(/\babs\s*\(/gi, 'Math.abs(')
        .replace(/\bround\s*\(/gi, 'Math.round(')
        .replace(/\bfloor\s*\(/gi, 'Math.floor(')
        .replace(/\bceil\s*\(/gi, 'Math.ceil(')
        .replace(/\bsin\s*\(/gi, 'Math.sin(')
        .replace(/\bcos\s*\(/gi, 'Math.cos(')
        .replace(/\btan\s*\(/gi, 'Math.tan(')
        .replace(/\basin\s*\(/gi, 'Math.asin(')
        .replace(/\bacos\s*\(/gi, 'Math.acos(')
        .replace(/\batan\s*\(/gi, 'Math.atan(')
        .replace(/\bln\s*\(/gi, 'Math.log(')
        .replace(/\blog\s*\(/gi, 'Math.log10(')
        .replace(/\bexp\s*\(/gi, 'Math.exp(')
        .replace(/\s+/g, '');

      expression = expression
        .replace(/(\d)(Math\.)/g, '$1*$2')
        .replace(/(\d)\(/g, '$1*(')
        .replace(/\)(\d)/g, ')*$1')
        .replace(/\)(Math\.)/g, ')*$1')
        .replace(/(Math\.(?:PI|E))(\d)/g, '$1*$2')
        .replace(/(Math\.(?:PI|E))\(/g, '$1*(');

      const sanitized = expression
        .replace(/Math\.(?:PI|E|sqrt|cbrt|abs|round|floor|ceil|sin|cos|tan|asin|acos|atan|log|log10|exp)/g, '1');

      if (/[^0-9+\-*/%().]/.test(sanitized)) {
        return null;
      }

      try {
        const result = Function('"use strict"; return (' + expression + ');')();
        if (typeof result !== 'number' || !Number.isFinite(result)) return null;
        return result;
      } catch (error) {
        return null;
      }
    }

    const currencyAliasEntries = Object.entries(currencyAliases)
      .sort((a, b) => b[0].length - a[0].length)
      .map(([alias, code]) => {
        const hasLetters = /[a-z]/i.test(alias);
        const pattern = hasLetters
          ? new RegExp('\\b' + alias.split(/\s+/).map(escapeRegExp).join('\\s+') + '\\b', 'gi')
          : new RegExp(escapeRegExp(alias), 'g');
        return { alias, code, pattern };
      });

    function escapeRegExp(value) {
      return String(value).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function parseFlexibleNumber(value) {
      const raw = String(value || '').trim().replace(/\s+/g, '');
      if (!raw) return NaN;

      const hasDot = raw.includes('.');
      const hasComma = raw.includes(',');

      if (hasDot && hasComma) {
        if (raw.lastIndexOf(',') > raw.lastIndexOf('.')) {
          return Number(raw.replace(/\./g, '').replace(',', '.'));
        }
        return Number(raw.replace(/,/g, ''));
      }

      if (hasComma) {
        const parts = raw.split(',');
        if (parts.length === 2 && parts[1].length <= 2) {
          return Number(raw.replace(',', '.'));
        }
        return Number(raw.replace(/,/g, ''));
      }

      return Number(raw);
    }

    function extractCurrencyMentions(query) {
      const text = String(query || '').toLowerCase();
      const matches = [];

      for (const entry of currencyAliasEntries) {
        entry.pattern.lastIndex = 0;
        let match;
        while ((match = entry.pattern.exec(text)) !== null) {
          matches.push({
            start: match.index,
            end: match.index + match[0].length,
            code: entry.code,
            alias: entry.alias
          });
          if (!match[0].length) {
            entry.pattern.lastIndex += 1;
          }
        }
      }

      matches.sort((a, b) => {
        if (a.start !== b.start) return a.start - b.start;
        return (b.end - b.start) - (a.end - a.start);
      });

      const filtered = [];
      for (const match of matches) {
        const overlaps = filtered.some((kept) => !(match.end <= kept.start || match.start >= kept.end));
        if (!overlaps) {
          filtered.push(match);
        }
      }

      return filtered;
    }



    function stripQuickPrefixes(query) {
      return String(query || '')
        .trim()
        .replace(/^\s*(?:what\s+is|what's|whats|hvad\s+er)\s+/i, '')
        .trim();
    }

    function shouldKeepSuggestionsAlongsideQuickResult(query, detected) {
      if (!detected || detected.kind === 'none') {
        return false;
      }

      const trimmed = stripQuickPrefixes(query).trim().toLowerCase();
      return detected.kind === 'math' && trimmed === 'pi';
    }

    function detectQuickResultQuery(query) {
      const trimmed = stripQuickPrefixes(query);
      if (!trimmed || currentMode !== 'search') {
        return { kind: 'none' };
      }

      const amountMatch = trimmed.match(/-?\d(?:[\d.,\s]*\d)?(?:[.,]\d+)?|-?\d/);
      const amount = amountMatch ? parseFlexibleNumber(amountMatch[0]) : NaN;
      const mentions = extractCurrencyMentions(trimmed);
      const uniqueCodes = [];

      for (const mention of mentions) {
        if (!uniqueCodes.includes(mention.code)) {
          uniqueCodes.push(mention.code);
        }
      }

      if (Number.isFinite(amount) && uniqueCodes.length >= 2 && uniqueCodes[0] !== uniqueCodes[1]) {
        return {
          kind: 'currency',
          amount,
          from: uniqueCodes[0],
          to: uniqueCodes[1]
        };
      }

      const mathResult = evaluateMathExpression(trimmed);
      if (mathResult !== null) {
        return { kind: 'math', result: mathResult };
      }

      return { kind: 'none' };
    }

    async function fetchRate(from, to) {
      const key = `${from}_${to}`;
      const inverseKey = `${to}_${from}`;
      const now = Date.now();
      const shortTtl = 1000 * 60 * 60;

      if (from === to) {
        return 1;
      }

      const cached = fxCache.get(key);
      if (cached && now - cached.time < shortTtl) {
        return cached.rate;
      }

      const inverse = fxCache.get(inverseKey);
      if (inverse && now - inverse.time < shortTtl && typeof inverse.rate === 'number' && inverse.rate !== 0) {
        const derived = 1 / inverse.rate;
        fxCache.set(key, { rate: derived, time: now });
        return derived;
      }

      const baseCached = fxBaseCache.get(from);
      if (baseCached && now < baseCached.expiresAt && baseCached.rates && typeof baseCached.rates[to] === 'number') {
        const rate = baseCached.rates[to];
        fxCache.set(key, { rate, time: now });
        if (rate !== 0) {
          fxCache.set(inverseKey, { rate: 1 / rate, time: now });
        }
        return rate;
      }

      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 1200);

      try {
        const response = await fetch(
          'https://open.er-api.com/v6/latest/' + encodeURIComponent(from),
          {
            method: 'GET',
            mode: 'cors',
            credentials: 'omit',
            signal: controller.signal,
            cache: 'force-cache'
          }
        );

        if (!response.ok) {
          throw new Error('Conversion request failed');
        }

        const data = await response.json();
        if (!data || data.result !== 'success' || !data.rates) {
          throw new Error('Conversion request failed');
        }

        const nextUpdateMs = typeof data.time_next_update_unix === 'number'
          ? data.time_next_update_unix * 1000
          : now + 1000 * 60 * 60 * 24;

        fxBaseCache.set(from, {
          rates: data.rates,
          expiresAt: nextUpdateMs
        });

        const rate = typeof data.rates[to] === 'number' ? data.rates[to] : null;
        if (typeof rate === 'number') {
          fxCache.set(key, { rate, time: now });
          if (rate !== 0) {
            fxCache.set(inverseKey, { rate: 1 / rate, time: now });
          }
        }

        return rate;
      } finally {
        clearTimeout(timeout);
      }
    }

    async function updateQuickResult(query) {
      const token = ++quickResultToken;
      const detected = detectQuickResultQuery(query);

      if (detected.kind === 'none') {
        hideQuickResult();
        return detected;
      }

      if (detected.kind === 'math') {
        showQuickResult('Calculator', formatResultNumber(detected.result));
        return detected;
      }

      if (detected.kind === 'currency' && Number.isFinite(detected.amount)) {
        showQuickResult('Converter', 'Loading…');
        try {
          const rate = await fetchRate(detected.from, detected.to);
          if (token !== quickResultToken) return detected;
          if (typeof rate === 'number') {
            const converted = detected.amount * rate;
            showQuickResult(
              'Converter',
              formatResultNumber(detected.amount) + ' ' + detected.from + ' = ' + formatResultNumber(converted) + ' ' + detected.to
            );
            return detected;
          }
        } catch (error) {
          if (token === quickResultToken) {
            showQuickResult('Converter', 'Could not load conversion');
          }
        }
      }

      return detected;
    }

    function jsonpRequest(url) {
      return new Promise((resolve, reject) => {
        const callbackName = `suggestCallback_${Date.now()}_${Math.floor(Math.random() * 10000)}`;
        const script = document.createElement('script');
        const timeout = setTimeout(() => {
          cleanup();
          reject(new Error('Suggestion request timed out'));
        }, 2500);

        function cleanup() {
          clearTimeout(timeout);
          delete window[callbackName];
          script.remove();
        }

        window[callbackName] = (data) => {
          cleanup();
          resolve(data);
        };

        script.onerror = () => {
          cleanup();
          reject(new Error('Suggestion request failed'));
        };

        script.src = `${url}&callback=${callbackName}`;
        document.body.appendChild(script);
      });
    }

    async function fetchJson(url) {
      const response = await fetch(url, {
        method: 'GET',
        mode: 'cors',
        credentials: 'omit'
      });

      if (!response.ok) {
        throw new Error('Suggestion request failed');
      }

      return response.json();
    }

    async function fetchSuggestions(query) {
      const requestToken = ++suggestionRequestToken;

      if (currentMode !== 'search') {
        hideSuggestions();
        return;
      }

      const selectedEngine = searchEngines[currentEngine] || searchEngines.google;

      const canRender = () =>
        requestToken === suggestionRequestToken &&
        currentMode === 'search' &&
        input.value.trim() === query &&
        query.length > 0;

      try {
        if (selectedEngine.suggest) {
          const data = await selectedEngine.suggest(query);
          const liveSuggestions = selectedEngine.parseSuggestions ? selectedEngine.parseSuggestions(data) : [];

          if (liveSuggestions.length && canRender()) {
            renderSuggestions(liveSuggestions);
            return;
          }
        }
      } catch (error) {
      }

      try {
        const googleData = await searchEngines.google.suggest(query);
        const googleSuggestions = searchEngines.google.parseSuggestions(googleData);

        if (googleSuggestions.length && canRender()) {
          renderSuggestions(googleSuggestions);
          return;
        }
      } catch (error) {
      }

      if (!canRender()) {
        return;
      }

      const filtered = fallbackSuggestions.filter((item) =>
        item.toLowerCase().includes(query.toLowerCase())
      );
      renderSuggestions(filtered);
    }

    function routeTypingToSearch(event) {
      if (event.defaultPrevented || event.ctrlKey || event.metaKey || event.altKey) {
        return;
      }

      const target = event.target;
      const isEditable =
        target instanceof HTMLElement &&
        (
          target === input ||
          target.tagName === 'TEXTAREA' ||
          (target.tagName === 'INPUT' && target !== engineTrigger) ||
          target.isContentEditable
        );

      if (isEditable) {
        return;
      }

      const isPrintable = event.key.length === 1;
      const isBackspace = event.key === 'Backspace';

      if (!isPrintable && !isBackspace) {
        return;
      }

      event.preventDefault();
      focusSearchInput(false);

      if (isPrintable) {
        const start = input.selectionStart ?? input.value.length;
        const end = input.selectionEnd ?? input.value.length;
        input.setRangeText(event.key, start, end, 'end');
      } else if (isBackspace) {
        const start = input.selectionStart ?? input.value.length;
        const end = input.selectionEnd ?? input.value.length;
        if (start !== end) {
          input.setRangeText('', start, end, 'end');
        } else if (start > 0) {
          input.setRangeText('', start - 1, start, 'end');
        }
      }

      input.dispatchEvent(new Event('input', { bubbles: true }));
    }
